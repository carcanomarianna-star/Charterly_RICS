<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoCharteRly</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ── PALETTE
     #9FBBCF  sky blue   → neutral / landing
     #6F597A  purple mid → RICS accent
     #503D5C  deep purple→ RICS primary
  ── */
  :root {
    /* App chrome — light, paper-like */
    --bg:       #eef2f5;          /* cool off-white, hint of sky */
    --surface:  #f7f9fb;          /* near-white panels */
    --card:     #ffffff;          /* pure white cards */
    --border:   #cdd8e0;          /* desaturated sky */
    --border2:  #b8c8d4;

    /* Sky / neutral (#9FBBCF) */
    --sky:        #5a8aa4;        /* darkened for legibility on light bg */
    --sky-dim:    #7aa3bb;
    --sky-bg:     #e4edf3;
    --sky-border: #9FBBCF;

    /* RICS purples (#503D5C / #6F597A) */
    --rics:        #503D5C;
    --rics-bright: #6F597A;
    --rics-bg:     #ede9f2;
    --rics-border: #b3a3c0;
    --rics-grd:    linear-gradient(135deg,#503D5C,#6F597A,#503D5C);

    --green:  #2e7d52;
    --red:    #c0392b;
    --amber:  #b5651d;

    /* Text */
    --text:   #1e2530;            /* near-black with cool tint */
    --muted:  #5a6a7a;
    --faint:  #96aab8;

    /* Default accent = sky blue */
    --accent:     #5a8aa4;
    --accent2:    #3a6e8a;
    --acc-bg:     #e4edf3;
    --acc-border: #9FBBCF;
    --acc-grd:    linear-gradient(135deg,#9FBBCF,#c2d8e8,#9FBBCF);
  }
  body.rics-mode  {
    --accent:     var(--rics);
    --accent2:    var(--rics-bright);
    --acc-bg:     var(--rics-bg);
    --acc-border: var(--rics-border);
    --acc-grd:    var(--rics-grd);
  }

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden;transition:background .3s}

  /* HEADER */
  header{position:sticky;top:0;z-index:100;background:rgba(247,249,251,.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:58px}
  .logo{display:flex;flex-direction:row;align-items:center;gap:12px}
  .logo img{height:52px;width:auto;display:block}
  .logo-tagline{font-family:'DM Sans',sans-serif;font-size:11px;font-style:italic;color:var(--muted);letter-spacing:.02em;white-space:nowrap}
  .header-right{display:flex;align-items:center;gap:14px}
  .progress-wrap{display:flex;align-items:center;gap:8px}
  .progress-track{background:var(--border);border-radius:20px;width:90px;height:5px;overflow:hidden}
  .progress-fill{height:100%;background:var(--acc-grd);border-radius:20px;transition:width .5s ease;width:0%}
  .progress-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);font-weight:500;min-width:30px}

  /* STEP BAR */
  .stepbar{background:var(--surface);border-bottom:1px solid var(--border);display:flex}
  .step-item{flex:1;text-align:center;padding:12px 6px;font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);border-bottom:2px solid transparent;cursor:default;transition:all .2s;user-select:none}
  .step-item.active{color:var(--accent);border-bottom-color:var(--accent)}
  .step-item.done{color:var(--green);border-bottom-color:var(--green);cursor:pointer}
  .step-item.done:hover{opacity:.8}

  /* Outer wrapper for CPD / Case Study / CV sections — matches r3-centre padding */
  .sec-outer { padding: 28px 28px 80px; min-width: 0; }

  /* MAIN */
  main{max-width:100%;margin:0;padding:0}

  /* PANELS */
  .panel{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px 44px;margin-bottom:18px;animation:fadeUp .25s ease both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .panel-info {border-color:var(--sky-border);background:var(--sky-bg)}
  .panel-warn {border-color:#e8b4b8;background:#fdf0f0}
  .panel-rics {border-color:var(--rics-border);background:var(--rics-bg)}
  .panel-acc  {border-color:var(--acc-border);background:var(--acc-bg)}

  h1.page-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--text);margin-bottom:4px}
  h2.section-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px}
  p.sub{color:var(--muted);font-size:12px;margin-bottom:20px;line-height:1.55}
  p.hint{color:var(--sky);font-size:12px;line-height:1.55}

  /* CHOICE CARDS */
  .choice-grid{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:24px}
  .choice-card{flex:1;min-width:200px;max-width:340px;border:2px solid var(--border);background:var(--surface);border-radius:12px;padding:22px 20px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between}
  .choice-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;opacity:0;transition:opacity .2s}
  /* RICS card */
  .rics-card:hover,.rics-card.selected{border-color:var(--rics);background:var(--rics-bg)}
  .rics-card:hover{box-shadow:0 6px 24px rgba(80,61,92,.25);transform:translateY(-2px)}
  .rics-card::before{background:var(--rics-grd)}
  .rics-card:hover::before,.rics-card.selected::before{opacity:1}
  /* CICES card */
  /* Generic */
  .choice-card.selected{border-color:var(--accent);background:var(--acc-bg)}
  .choice-card.selected::before{opacity:1;background:var(--acc-grd)}
  .choice-card:hover{border-color:var(--accent)}
  .choice-card.disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
  .choice-label{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;margin-bottom:5px}
  .choice-desc{font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.5}

  /* BADGES */
  .badge{display:inline-block;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.05em;padding:2px 8px;border-radius:3px}
  .badge-sky  {background:var(--sky-bg);color:var(--sky);border:1px solid var(--sky-border)}
  .badge-rics {background:var(--rics-bg);color:var(--rics-bright);border:1px solid var(--rics-border)}
  .badge-muted{background:var(--border);color:var(--muted)}
  .badge-acc  {background:var(--acc-bg);color:var(--accent);border:1px solid var(--acc-border)}
  .badge-red  {background:#fdf0f0;color:#c0392b;border:1px solid #e8b4b8}

  /* BUTTONS */
  .btn{display:inline-flex;align-items:center;gap:6px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;padding:10px 22px;border-radius:8px;border:none;cursor:pointer;transition:all .15s;letter-spacing:.02em}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
  .btn-primary:disabled{opacity:.35;cursor:not-allowed;transform:none}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border2)}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
  .btn-row{display:flex;gap:10px;margin-top:4px;align-items:center;flex-wrap:wrap}

  /* COMPETENCY ROWS */
  .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
  .comp-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:8px;margin-bottom:5px;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:all .13s;user-select:none}
  .panel-collapsible .panel-body { transition: max-height .3s ease, opacity .25s ease; overflow: hidden; }
  .panel-collapsible.collapsed .panel-body { max-height: 0 !important; opacity: 0; }
  /* Clickable header row */
  .panel-collapsible .section-header { cursor: pointer; user-select: none; border-radius: 6px; padding: 4px 6px; margin: -4px -6px 5px; transition: background .13s; }
  .panel-collapsible .section-header:hover { background: var(--surface); }
  /* Chevron button */
  .panel-collapse-btn { background: none; border: none; cursor: pointer; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 6px; transition: all .15s; color: var(--muted); flex-shrink: 0; }
  .panel-collapse-btn:hover { background: var(--border); color: var(--text); }
  .panel-collapse-btn svg { transition: transform .25s ease; }
  .panel-collapsible.collapsed .panel-collapse-btn svg { transform: rotate(-90deg); }
  .comp-row:hover:not(.disabled):not(.locked):not(.auto-locked){border-color:var(--accent);background:var(--acc-bg)}
  .comp-row.selected   {border-color:var(--accent);background:var(--acc-bg)}
  .comp-row.disabled   {opacity:.35;cursor:not-allowed}
  .comp-row.auto-locked{border-color:var(--rics-border);background:var(--rics-bg);cursor:default;opacity:1}
  .comp-id      {font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:var(--accent);min-width:42px;flex-shrink:0}
  .comp-name    {flex:1;font-size:13px}
  .comp-conflict{font-size:11px;color:var(--red);flex-shrink:0}
  .comp-limit   {font-size:11px;color:var(--muted);flex-shrink:0}
  .comp-auto    {font-size:11px;color:var(--rics-bright);flex-shrink:0}

  .chk{width:17px;height:17px;border-radius:4px;flex-shrink:0;border:2px solid var(--faint);background:transparent;display:flex;align-items:center;justify-content:center;transition:all .12s}
  .chk.on{border-color:var(--accent);background:var(--accent)}
  .chk.radio{border-radius:50%}
  .chk-lock-r{width:17px;height:17px;border-radius:50%;flex-shrink:0;border:2px solid var(--rics);background:var(--rics);display:flex;align-items:center;justify-content:center}

  /* MSR toggle */
  .sf3-toggle{display:flex;align-items:center;gap:5px;margin-left:auto}
  .sf3-lbl{font-size:11px;color:var(--muted);margin-right:2px}
  .sf3-btn{font-family:'DM Mono',monospace;font-size:10px;font-weight:600;padding:3px 10px;border-radius:4px;border:none;cursor:pointer;transition:all .15s}
  .sf3-btn.on {background:var(--accent);color:#fff}
  .sf3-btn.off{background:var(--border);color:var(--muted)}
  .sf3-btn.off:hover{background:var(--border2);color:var(--text)}

  /* STATEMENT EDITOR */
  /* ── 3-COLUMN PAGE LAYOUT ── */
  /* Step 0/1/2/4: single centred column */
  .page-centre{max-width:1080px;width:100%;margin:0 auto;padding:48px 40px 80px;box-sizing:border-box}

  /* Step 2: left-glossary | centre panels */
  .r2-layout{
    display:grid;
    grid-template-columns:220px 1fr 272px;
    gap:0;
    align-items:flex-start;
    min-height:calc(100vh - 116px);
  }
  .r2-centre{padding:28px 24px 80px;min-width:0}
  .r2-nav-item:hover { background: var(--surface) !important; border-color: var(--border) !important; }
  .r2-nav-active:hover { background: var(--acc-bg) !important; border-color: var(--acc-border) !important; }
  .r2-glossary{
    position:sticky;top:58px;
    height:calc(100vh - 58px);
    overflow-y:auto;
    border-left:1px solid var(--border);
    padding:16px 14px 24px;
    background:var(--surface);
    scrollbar-width:thin;
    scrollbar-color:var(--rics-border) transparent;
  }

  /* Step 3: left-nav | centre editor | right-glossary */
  .r3-layout{
    display:grid;
    grid-template-columns:220px 1fr 272px;
    gap:0;
    align-items:flex-start;
    min-height:calc(100vh - 116px);
  }

  /* Left nav sidebar (step 3) */
  .sidebar{
    position:sticky;top:58px;
    height:calc(100vh - 58px);
    overflow-y:auto;
    border-right:1px solid var(--border);
    padding:16px 12px 24px;
    background:var(--surface);
    scrollbar-width:thin;
    scrollbar-color:var(--border) transparent;
    flex-shrink:0;
  }
  .sidebar-cat{font-family:'DM Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:5px;margin-top:14px;padding-left:6px}
  .sidebar-cat:first-child{margin-top:0}
  .sidebar-item{display:flex;align-items:flex-start;gap:7px;padding:8px 10px;border-radius:6px;margin-bottom:3px;cursor:pointer;font-size:12px;color:var(--muted);border:1px solid transparent;transition:all .12s}
  .sidebar-item:hover{color:var(--text);background:var(--card)}
  .sidebar-item.active{color:var(--accent);background:var(--acc-bg);border-color:var(--acc-border)}

  /* Centre editor column (step 3) */
  .r3-centre{padding:28px 28px 80px;min-width:0;overflow:hidden}

  /* Right glossary column (shared step 2 & 3) */
  .r3-glossary{
    position:sticky;top:58px;
    height:calc(100vh - 58px);
    overflow-y:auto;
    border-left:1px solid var(--border);
    padding:16px 14px 24px;
    background:var(--surface);
    scrollbar-width:thin;
    scrollbar-color:var(--rics-border) transparent;
  }
  .dot{width:7px;height:7px;border-radius:50%;background:var(--faint);flex-shrink:0;transition:background .2s;margin-top:5px}
  .dot.done{background:var(--green)}

  .editor-main{flex:1;min-width:0}
  .editor-empty{text-align:center;padding:56px 24px;background:var(--card);border:1px solid var(--border);border-radius:14px;animation:fadeUp .25s ease}
  .editor-empty-icon{font-size:44px;margin-bottom:14px}
  .editor-empty-text{color:var(--muted);font-size:14px}
  .editor-empty-sub{color:var(--faint);font-size:12px;margin-top:6px}

  .stmt-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:14px;transition:border-color .2s}
  .stmt-card:focus-within{border-color:var(--accent)}
  .stmt-level-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
  .level-badge{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;padding:3px 9px;border-radius:3px;background:var(--acc-bg);color:var(--accent);letter-spacing:.05em}
  .word-target{font-size:11px;color:var(--faint)}
  .guidance-link{font-size:11px;color:var(--sky);text-decoration:none;margin-left:auto}
  .guidance-link:hover{color:var(--accent2);text-decoration:underline}
  .tip-box{background:var(--sky-bg);border:1px solid var(--sky-border);border-radius:6px;padding:9px 12px;margin-bottom:10px;font-size:12px;color:var(--sky);line-height:1.55}
  textarea{width:100%;min-height:108px;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 13px;resize:vertical;line-height:1.65;transition:border-color .15s}
  textarea:focus{outline:none;border-color:var(--accent)}
  textarea::placeholder{color:var(--faint)}
  .wc-row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:5px;margin-bottom:3px}
  .wc-val{font-family:'DM Mono',monospace;font-weight:500}
  .wc-bar-track{background:var(--border);border-radius:3px;height:4px;overflow:hidden}
  .wc-bar-fill{height:100%;border-radius:3px;transition:width .15s,background .3s}

  /* ERRORS */
  .error-box{background:#fdf0f0;border:1px solid #e8b4b8;border-radius:8px;padding:12px 16px;margin-bottom:16px;animation:fadeUp .2s ease}
  .error-item{color:#c0392b;font-size:13px;margin-bottom:2px}
  .error-item::before{content:"⚠ "}

  /* SUMMARY */
  .summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
  .summary-cell{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 14px}
  .summary-cell-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--faint);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em}
  .summary-cell-val{font-size:13px;font-weight:600}

  #casestudy-ta{min-height:380px;font-size:14px;line-height:1.7}
  .cs-bar-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--faint);margin-top:4px;font-family:'DM Mono',monospace}

  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:var(--surface)}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

  @media(max-width:860px){
    .r2-layout,.r3-layout{ grid-template-columns:1fr; }
    .sidebar,.r2-glossary,.r3-glossary{ position:static;height:auto;border:none;padding:0 14px 12px; }
    .r2-centre,.r3-centre{ padding:20px 14px 40px; }
    .summary-grid{grid-template-columns:1fr 1fr}
    header{padding:0 16px}
  }

  /* ── STATEMENT SECTION PANELS ── */
  .section-wc-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 18px;
  }

  .section-panel-header {
    margin-bottom: 4px;
  }

  /* stmt-card completed state */
  .stmt-card.stmt-done {
    border-color: var(--rics-border);
    background: var(--rics-bg);
    opacity: 0.85;
  }
  .stmt-card.stmt-done textarea {
    background: #f3f0f6;
    color: var(--muted);
    pointer-events: none;
  }

  /* Completed dot — uses rics purple */
  .dot.completed { background: var(--rics-bright); }

  /* Section toggle tabs */
  .section-tab { user-select: none; }
  .section-tab:hover { opacity: 0.85; }

  /* Sidebar wider for progress bars */

  /* Completed button */
  .btn-complete {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 7px 16px;
    border-radius: 7px;
    cursor: pointer;
    transition: all .15s;
    flex-shrink: 0;
    border: 1.5px solid var(--border2);
    background: var(--surface);
    color: var(--muted);
  }
  .btn-complete:hover {
    border-color: var(--rics-border);
    color: var(--rics);
    background: var(--rics-bg);
  }
  .btn-complete.is-done {
    background: var(--rics-bg);
    color: var(--rics);
    border-color: var(--rics-border);
    font-weight: 700;
  }


  /* ── GLOSSARY PANEL (fills its column) ── */
  .g-sidebar{ width:100%; }   /* fills the r2/r3 grid column */
  .g-panel{
    background:var(--card);
    border:1px solid var(--rics-border);
    border-radius:12px;
    overflow:hidden;
  }

  /* Header */
  .g-panel-header{
    background:var(--rics-bg);
    border-bottom:1px solid var(--rics-border);
    padding:13px 16px 11px;
  }
  .g-panel-title{
    font-family:'Playfair Display',serif;
    font-size:14px;font-weight:700;
    color:var(--rics);line-height:1.3;margin-bottom:6px;
  }
  .g-panel-meta{ display:flex;gap:5px;flex-wrap:wrap; }
  .g-meta-id,.g-meta-level,.g-meta-req{
    font-family:'DM Mono',monospace;font-size:10px;font-weight:500;
    padding:2px 7px;border-radius:3px;letter-spacing:.04em;
  }
  .g-meta-id   { background:var(--rics-border);color:var(--rics); }
  .g-meta-level{ background:#503D5C;color:#fff; }
  .g-meta-req  { background:var(--surface);color:var(--muted);border:1px solid var(--border); }

  /* Body */
  .g-panel-body{ padding:14px 15px 16px; }
  .g-section-label{
    font-family:'DM Mono',monospace;font-size:9px;font-weight:600;
    letter-spacing:.11em;text-transform:uppercase;
    color:var(--rics-bright);margin-bottom:6px;
  }
  .g-def-box{
    font-size:12px;color:var(--text);line-height:1.65;
    background:var(--rics-bg);border:1px solid var(--rics-border);
    border-radius:7px;padding:10px 12px;margin-bottom:2px;
  }
  .g-def-faint{ opacity:.65; }
  .g-ex-box{
    font-size:12px;color:var(--text);line-height:1.6;
    background:var(--surface);border:1px solid var(--border);
    border-radius:7px;padding:10px 12px;
  }
  .g-ex-faint{ opacity:.65; }
  .g-intro{
    color:var(--muted);font-size:11px;font-style:italic;
    margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);
  }
  .g-list{ margin:0;padding-left:16px;display:flex;flex-direction:column;gap:5px; }
  .g-list li{ font-size:12px;color:var(--text);line-height:1.55;padding-left:2px; }
  .g-list li::marker{ color:var(--rics-bright); }
  .g-details{ margin-top:10px;border:1px solid var(--border);border-radius:7px;overflow:hidden; }
  .g-summary{
    font-family:'DM Mono',monospace;font-size:10px;font-weight:600;
    letter-spacing:.07em;text-transform:uppercase;color:var(--muted);
    padding:8px 12px;cursor:pointer;background:var(--surface);
    user-select:none;list-style:none;display:flex;align-items:center;gap:6px;
  }
  .g-summary::-webkit-details-marker{ display:none; }
  .g-summary::before{ content:'▶';font-size:8px;color:var(--rics-bright);transition:transform .2s; }
  details[open] .g-summary::before{ transform:rotate(90deg); }
  details[open] .g-summary{ color:var(--rics);background:var(--rics-bg); }
  .g-details .g-def-box,.g-details .g-ex-box{
    border-radius:0;border-left:none;border-right:none;border-bottom:none;margin-bottom:0;
  }
  .g-empty{ padding:30px 18px 24px;text-align:center; }
  .g-empty-icon{ font-size:30px;margin-bottom:10px; }
  .g-empty p{ font-size:12px;color:var(--faint);line-height:1.65; }


  /* ══════════════════════════════════════════ ELIGIBILITY WIZARD ══════════ */

  .elig-wrap {
    max-width: 780px;
    margin: 0 auto;
    padding: 32px 24px 100px;
  }

  /* Hero banner */
  .elig-hero {
    background: var(--rics-grd);
    border-radius: 16px;
    padding: 40px 44px;
    margin-bottom: 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .elig-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 80% 20%, rgba(255,255,255,.08) 0%, transparent 60%);
  }
  .elig-logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .elig-badge-rics {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 15px;
    color: #fff;
    background: rgba(255,255,255,.18);
    padding: 3px 12px;
    border-radius: 4px;
    letter-spacing: .08em;
  }
  .elig-badge-sep { color: rgba(255,255,255,.4); font-size: 18px; }
  .elig-badge-path { font-size: 13px; color: rgba(255,255,255,.8); letter-spacing: .05em; }
  .elig-title {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 900;
    color: #fff;
    letter-spacing: .05em;
    margin-bottom: 10px;
    position: relative;
  }
  .elig-subtitle {
    font-size: 14px;
    color: rgba(255,255,255,.82);
    line-height: 1.6;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
  }

  /* Breadcrumb trail */
  .elig-breadcrumbs {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 4px;
    padding: 10px 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 20px;
  }
  .elig-bc-item {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 9px;
    background: var(--rics-bg);
    border: 1px solid var(--rics-border);
    border-radius: 5px;
    cursor: pointer;
    transition: all .13s;
  }
  .elig-bc-item:hover { background: var(--rics-border); }
  .elig-bc-item:hover .elig-bc-edit { opacity: 1; }
  /* CICES Competency tickbox styles */
  .elig-bc-a { font-size: 11px; font-weight: 600; color: var(--rics); }
  .elig-bc-edit { font-size: 10px; color: var(--rics-bright); opacity: 0; transition: opacity .13s; margin-left: 2px; }
  .elig-bc-arrow { color: var(--faint); font-size: 12px; padding: 0 2px; }

  /* Question card */
  .elig-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 40px;
    animation: fadeUp .2s ease;
  }
  .elig-step-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--rics-bright);
    margin-bottom: 8px;
  }
  .elig-progress-bar {
    background: var(--border);
    border-radius: 3px;
    height: 4px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .elig-progress-fill {
    height: 100%;
    background: var(--rics-grd);
    border-radius: 3px;
    transition: width .4s ease;
  }
  .elig-question {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 10px;
    line-height: 1.35;
  }
  .elig-hint {
    font-size: 12px;
    color: var(--muted);
    background: var(--sky-bg);
    border: 1px solid var(--sky-border);
    border-radius: 6px;
    padding: 9px 13px;
    margin-bottom: 24px;
    line-height: 1.55;
  }

  /* Option buttons */
  .elig-options { display: flex; flex-direction: column; gap: 10px; }
  .elig-opt-btn {
    display: flex;
    align-items: center;
    text-align: left;
    padding: 16px 22px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all .15s;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    position: relative;
  }
  .elig-opt-btn::before {
    content: '';
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-radius: 50%;
    flex-shrink: 0;
    margin-right: 14px;
    transition: all .15s;
  }
  .elig-opt-btn:hover {
    border-color: var(--rics-bright);
    background: var(--rics-bg);
  }
  .elig-opt-btn.selected,
  .elig-opt-btn:active {
    border-color: var(--rics);
    background: var(--rics-bg);
  }
  .elig-opt-btn.selected::before {
    border-color: var(--rics);
    background: var(--rics);
    box-shadow: inset 0 0 0 3px #fff;
  }
  .elig-opt-label { font-size: 14px; font-weight: 500; }
  .elig-back-btn {
    margin-top: 20px;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    padding: 4px 0;
    font-family: 'DM Sans', sans-serif;
  }
  .elig-back-btn:hover { color: var(--rics); }

  /* RPQ select list */
  .elig-select-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 360px;
    overflow-y: auto;
    padding-right: 4px;
  }
  .elig-select-item {
    padding: 11px 16px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all .13s;
    font-size: 13px;
    color: var(--text);
  }
  .elig-select-item:hover { border-color: var(--rics-bright); background: var(--rics-bg); }
  .elig-select-item.selected { border-color: var(--rics); background: var(--rics-bg); font-weight: 600; color: var(--rics); }
  .elig-select-name { font-size: 13px; }

  /* Result card */
  .elig-result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    animation: fadeUp .25s ease;
  }
  .elig-result-header {
    padding: 28px 36px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .elig-result-status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .elig-result-icon { font-size: 22px; }
  .elig-result-status {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .elig-result-title {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 12px;
    line-height: 1.3;
  }
  .elig-result-route-badge {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 4px;
    letter-spacing: .04em;
  }
  .elig-result-body { padding: 24px 36px; }
  .elig-result-section { margin-bottom: 18px; }
  .elig-result-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--faint);
    margin-bottom: 4px;
  }
  .elig-result-value {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .elig-result-notes {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.65;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 12px 14px;
  }
  .elig-actions-list {
    margin: 0;
    padding-left: 18px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .elig-actions-list li {
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
  }
  .elig-actions-list li::marker { color: var(--rics-bright); }
  .elig-prelim-notice {
    background: #fdf5e4;
    border: 1px solid #e0c97a;
    border-radius: 7px;
    padding: 11px 14px;
    font-size: 13px;
    color: #7a5c10;
    margin-bottom: 18px;
    line-height: 1.55;
  }
  .elig-rpq-warn {
    background: #fdf0f0;
    border: 1px solid #e8b4b8;
    border-radius: 7px;
    padding: 11px 14px;
    font-size: 13px;
    color: #8b2020;
    margin-bottom: 18px;
    line-height: 1.55;
  }
  .elig-rpq-ok {
    background: var(--sky-bg);
    border: 1px solid var(--sky-border);
    border-radius: 7px;
    padding: 11px 14px;
    font-size: 13px;
    color: var(--sky);
    margin-bottom: 18px;
    line-height: 1.55;
  }
  .elig-result-footer {
    padding: 18px 36px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  /* Reset button — fixed bottom-right */
  .reset-btn-fixed {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 999;
    background: var(--surface);
    color: var(--muted);
    border: 1.5px solid var(--border2);
    border-radius: 50px;
    padding: 9px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 7px;
    box-shadow: 0 2px 12px rgba(0,0,0,.08);
    transition: all .15s;
    letter-spacing: .02em;
  }
  .reset-btn-fixed:hover {
    background: #fdf0f0;
    border-color: #e8b4b8;
    color: #c0392b;
    box-shadow: 0 4px 18px rgba(0,0,0,.13);
  }
  .reset-btn-fixed .reset-icon { font-size: 13px; }

  /* Autosave indicator */
  .autosave-indicator {
    position: fixed;
    bottom: 24px;
    right: 180px;
    z-index: 999;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--faint);
    display: flex;
    align-items: center;
    gap: 5px;
    opacity: 0;
    transition: opacity .5s;
  }
  .autosave-indicator.visible { opacity: 1; }
  .autosave-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse-save 1.5s ease-in-out;
  }
  @keyframes pulse-save {
    0%   { transform: scale(1);   opacity: 1; }
    50%  { transform: scale(1.5); opacity: .6; }
    100% { transform: scale(1);   opacity: 0; }
  }


  .elig-select-group-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--rics-bright);
    padding: 10px 4px 4px;
    border-bottom: 1px solid var(--rics-border);
    margin-bottom: 4px;
    margin-top: 6px;
  }
  .elig-select-group-label:first-child { margin-top: 0; }
  .elig-select-main { font-size: 13px; font-weight: 500; line-height: 1.3; }
  .elig-select-exp  { font-size: 10px; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }
  .elig-select-item.selected .elig-select-exp { color: var(--rics-bright); }

  .step-elig {
    cursor: pointer !important;
    font-size: 11px !important;
    opacity: .75;
  }
  .step-elig:hover { opacity: 1 !important; color: var(--text) !important; }
  .step-elig.done  { color: var(--green) !important; }

  /* ══════════════════════════════════════════════ CASE STUDY (STEP 4) ═════ */

  .cs-layout {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 0;
    align-items: flex-start;
    min-height: calc(100vh - 116px);
  }
  .cs-main {
    padding: 28px 30px 80px;
    min-width: 0;
  }
  .cs-guidance {
    position: sticky;
    top: 58px;
    height: calc(100vh - 58px);
    overflow-y: auto;
    border-left: 1px solid var(--border);
    background: var(--surface);
    padding: 18px 16px 32px;
    scrollbar-width: thin;
    scrollbar-color: var(--rics-border) transparent;
  }

  /* Experience report cross-ref sidebar */
  .er-sidebar-ref-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    border: 1px solid var(--rics-border);
    background: var(--rics-bg);
    color: var(--rics);
    cursor: pointer;
    transition: all .15s;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .er-sidebar-ref-btn:hover, .er-sidebar-ref-btn.referenced {
    background: var(--rics);
    color: #fff;
    border-color: var(--rics);
  }
  @media (max-width: 1100px) {
    .er-layout-3col { grid-template-columns: 180px 1fr !important; }
    .er-layout-3col .cs-guidance { display: none; }
  }
  @media (max-width: 800px) {
    .er-layout-3col { grid-template-columns: 1fr !important; }
    .er-layout-3col > div:first-child { display: none; }
  }

  /* Guidance panel sections */
  .cs-guide-title {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--rics);
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--rics-border);
  }
  .cs-guide-section {
    margin-bottom: 14px;
  }
  .cs-guide-section-title {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: .11em;
    text-transform: uppercase;
    color: var(--rics-bright);
    margin-bottom: 5px;
  }
  .cs-guide-text {
    font-size: 11.5px;
    color: var(--muted);
    line-height: 1.65;
  }
  .cs-guide-text strong { color: var(--text); font-weight: 600; }
  .cs-guide-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 12px 0;
  }
  .cs-structure-item {
    display: flex;
    gap: 9px;
    margin-bottom: 8px;
    align-items: flex-start;
  }
  .cs-structure-num {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    color: #fff;
    background: var(--rics);
    border-radius: 50%;
    width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .cs-structure-body {}
  .cs-structure-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }
  .cs-structure-desc {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* Tip box */
  .cs-tip-box {
    background: var(--rics-bg);
    border: 1px solid var(--rics-border);
    border-left: 3px solid var(--rics);
    border-radius: 7px;
    padding: 11px 14px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 16px;
  }
  .cs-tip-box strong { color: var(--rics); }

  /* Warning box */
  .cs-warn-box {
    background: #fdf5e4;
    border: 1px solid #e0c97a;
    border-left: 3px solid #c8a830;
    border-radius: 7px;
    padding: 11px 14px;
    font-size: 12px;
    color: #7a5c10;
    line-height: 1.6;
    margin-bottom: 16px;
  }

  /* Appendix section */
  .cs-appendix-section {
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
  }
  .cs-appendix-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .cs-appendix-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 12px;
  }
  .cs-appendix-item {
    position: relative;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    width: 120px;
    cursor: default;
    transition: border-color .15s;
  }
  .cs-appendix-item:hover { border-color: var(--rics-bright); }
  .cs-appendix-thumb {
    width: 100%;
    height: 72px;
    object-fit: cover;
    border-radius: 5px;
    display: block;
    margin-bottom: 6px;
    background: var(--surface);
  }
  .cs-appendix-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    color: var(--rics-bright);
    margin-bottom: 1px;
  }
  .cs-appendix-title-input {
    width: 100%;
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 3px 7px;
    margin: 3px 0 2px;
    box-sizing: border-box;
    transition: border-color .13s;
  }
  .cs-appendix-title-input:focus {
    outline: none;
    border-color: var(--rics-border);
  }
  .cs-appendix-title-input::placeholder { color: var(--faint); }
  .cs-appendix-name {
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cs-appendix-remove {
    position: absolute;
    top: 4px; right: 4px;
    width: 18px; height: 18px;
    background: rgba(200,50,50,.8);
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 10px;
    line-height: 18px;
    text-align: center;
    cursor: pointer;
    display: none;
    padding: 0;
    font-family: monospace;
  }
  .cs-appendix-item:hover .cs-appendix-remove { display: block; }
  .cs-upload-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 8px 16px;
    background: var(--surface);
    border: 1.5px dashed var(--border2);
    border-radius: 8px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
    font-family: 'DM Sans', sans-serif;
  }
  .cs-upload-btn:hover {
    border-color: var(--rics-bright);
    color: var(--rics);
    background: var(--rics-bg);
  }

  /* Figure reference tag (inline in textarea area — shown as tooltip on hover) */
  .fig-ref-tag {
    display: inline-block;
    background: var(--rics-bg);
    border: 1px solid var(--rics-border);
    border-radius: 3px;
    padding: 1px 5px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--rics);
    cursor: help;
    position: relative;
  }

  /* Image hover preview tooltip */
  .fig-preview-tooltip {
    display: none;
    position: fixed;
    z-index: 9999;
    background: var(--card);
    border: 1.5px solid var(--rics-border);
    border-radius: 10px;
    padding: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,.18);
    pointer-events: none;
  }
  .fig-preview-tooltip img {
    max-width: 260px;
    max-height: 200px;
    display: block;
    border-radius: 6px;
  }
  .fig-preview-tooltip .fig-preview-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--rics-bright);
    margin-top: 6px;
    text-align: center;
  }

  /* Case study textarea styling */
  #casestudy-ta {
    min-height: 520px;
    font-size: 14px;
    line-height: 1.75;
  }

  @media(max-width:860px) {
    .cs-layout { grid-template-columns: 1fr; }
    .cs-guidance { position: static; height: auto; border: none; padding: 14px; }
    .cs-main { padding: 20px 14px 40px; }
  }


  /* Appendix item action buttons */
  .cs-appendix-actions {
    display: flex;
    gap: 4px;
    margin-top: 5px;
    justify-content: center;
    opacity: 0;
    transition: opacity .13s;
  }
  .cs-appendix-item:hover .cs-appendix-actions { opacity: 1; }
  .cs-appx-btn {
    flex: 1;
    padding: 3px 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--surface);
    font-size: 11px;
    cursor: pointer;
    transition: all .12s;
    color: var(--muted);
    font-family: monospace;
  }
  .cs-appx-btn:hover { background: var(--card); color: var(--text); border-color: var(--border2); }
  .cs-appx-open:hover   { color: var(--rics); border-color: var(--rics-border); background: var(--rics-bg); }
  .cs-appx-replace:hover{ color: #2e7d52; border-color: #a8d5b5; background: #f0faf4; }
  .cs-appx-del:hover    { color: #c0392b; border-color: #f0b4b4; background: #fdf0f0; }

  /* Thumbnail cursor hint */
  .cs-appendix-thumb { cursor: zoom-in; }

  /* Lightbox fade-in */
  @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }

  /* Remove old single remove button (replaced by actions row) */
  .cs-appendix-remove { display: none !important; }


  /* ══════════════════════════════════════════════ AI INTEGRITY MODAL ══════ */
  .ai-modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 11000;
    background: rgba(0,0,0,.65);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn .2s ease;
    padding: 20px;
  }
  .ai-modal {
    background: var(--card);
    border: 1.5px solid var(--rics-border);
    border-top: 4px solid var(--rics);
    border-radius: 16px;
    max-width: 520px;
    width: 100%;
    padding: 32px 36px 28px;
    box-shadow: 0 24px 64px rgba(0,0,0,.28);
    animation: slideUp .22s ease;
  }
  @keyframes slideUp {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .ai-modal-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: #fff0f0;
    border: 1px solid #f0b4b4;
    border-radius: 5px;
    padding: 4px 11px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: #c0392b;
    margin-bottom: 14px;
  }
  .ai-modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 16px;
    line-height: 1.3;
  }
  .ai-modal-body {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.72;
    margin-bottom: 22px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }
  .ai-modal-body strong { color: var(--text); font-weight: 600; }
  .ai-modal-body em { color: #c0392b; font-style: normal; font-weight: 600; }
  .ai-modal-footer {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 12px;
  }
  .ai-modal-understand {
    background: var(--rics);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 11px 28px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s;
    letter-spacing: .01em;
  }
  .ai-modal-understand:hover { opacity: .88; }


  /* ══════════════════════════════════════════════ HEADER BUTTONS ══════════ */
  .header-btns { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .header-btn  { padding:7px 12px !important; font-size:12px !important; }

  /* ══════════════════════════════════════════════ SECTION TABS (header) ════ */
  .section-tabs-bar {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 18px;
  }
  .stab {
    flex: 1;
    text-align: center;
    padding: 8px 6px;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    color: var(--muted);
    border: 1px solid transparent;
    font-family: 'DM Sans', sans-serif;
  }
  .stab:hover  { background: var(--card); color: var(--text); }
  .stab.active { background: var(--acc-bg); color: var(--accent); border-color: var(--acc-border); }
  .stab.stab-cpd.active    { background: var(--rics-bg);  color: var(--rics);   border-color: var(--rics-border); }
  .stab.stab-cs.active     { background: var(--rics-bg);  color: var(--rics);   border-color: var(--rics-border); }
  .stab.stab-cv.active     { background: var(--rics-bg);  color: var(--rics);   border-color: var(--rics-border); }

  /* ══════════════════════════════════════════════ CPD LOGBOOK ═════════════ */
  .cpd-layout {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 0;
    align-items: flex-start;
    min-height: calc(100vh - 116px);
  }
  .cpd-main { padding: 24px 28px 80px; min-width: 0; }
  .cpd-side {
    position: sticky;
    top: 58px;
    height: calc(100vh - 58px);
    overflow-y: auto;
    border-left: 1px solid var(--border);
    background: var(--surface);
    padding: 18px 16px 32px;
    scrollbar-width: thin;
  }


  /* CPD counter card */
  .cpd-counter-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 20px;
  }
  .cpd-counter-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 14px;
  }
  .cpd-bars { display: flex; flex-direction: column; gap: 10px; }
  .cpd-bar-row { display:flex; align-items:center; gap:10px; }
  .cpd-bar-label { font-size:12px; font-weight:600; color:var(--text); min-width:90px; }
  .cpd-bar-track { flex:1; height:8px; background:var(--border); border-radius:4px; overflow:hidden; position:relative; }
  .cpd-bar-fill  { height:100%; border-radius:4px; transition:width .4s ease; }
  .cpd-bar-val   { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); min-width:50px; text-align:right; }
  .cpd-ok-badge  { display:inline-flex;align-items:center;gap:5px;background:#e8f5e9;border:1px solid #a8d5b5;color:#2e7d52;border-radius:4px;padding:2px 8px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace; }
  .cpd-warn-badge{ display:inline-flex;align-items:center;gap:5px;background:#fdf5e4;border:1px solid #e0c97a;color:#7a5c10;border-radius:4px;padding:2px 8px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace; }

  /* CPD entry form */
  .cpd-form-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 22px;
    margin-bottom: 16px;
    animation: fadeUp .2s ease;
  }
  .cpd-form-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 14px;
    font-family: 'Playfair Display', serif;
  }
  .cpd-form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .cpd-form-row { display:flex; flex-direction:column; gap:4px; }
  .cpd-form-row.full { grid-column: 1 / -1; }
  .cpd-form-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--faint);
  }
  .cpd-input, .cpd-select, .cpd-textarea {
    padding: 8px 10px;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    transition: border-color .13s;
  }
  .cpd-input:focus, .cpd-select:focus, .cpd-textarea:focus {
    border-color: var(--accent);
    outline: none;
  }
  .cpd-textarea { min-height:80px; resize:vertical; }
  .cpd-char-count { font-size:10px; color:var(--faint); text-align:right; font-family:'DM Mono',monospace; }

  /* CPD entry list */
  .cpd-entry {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items: flex-start;
    transition: border-color .13s;
  }
  .cpd-entry:hover { border-color: var(--border2); }
  .cpd-entry-title { font-size:13px; font-weight:600; color:var(--text); margin-bottom:4px; }
  .cpd-entry-meta  { display:flex; flex-wrap:wrap; gap:5px; margin-top:6px; }
  .cpd-badge {
    font-family:'DM Mono',monospace; font-size:9px; font-weight:700;
    padding:2px 7px; border-radius:3px; letter-spacing:.04em;
  }
  .cpd-badge-structured  { background:var(--acc-bg);  color:var(--accent); border:1px solid var(--acc-border); }
  .cpd-badge-unstructured{ background:var(--surface);  color:var(--muted);  border:1px solid var(--border); }
  .cpd-badge-completed   { background:#e8f5e9; color:#2e7d52; border:1px solid #a8d5b5; }
  .cpd-badge-planned     { background:#fdf5e4; color:#7a5c10; border:1px solid #e0c97a; }
  .cpd-badge-rics        { background:var(--rics-bg); color:var(--rics); border:1px solid var(--rics-border); }
  .cpd-badge-hours       { background:var(--surface); color:var(--muted); border:1px solid var(--border); }
  .cpd-entry-actions { display:flex; gap:6px; }
  .cpd-action-btn {
    padding:5px 10px;
    border:1px solid var(--border);
    border-radius:5px;
    background:var(--surface);
    font-size:11px;
    cursor:pointer;
    color:var(--muted);
    transition:all .12s;
  }
  .cpd-action-btn:hover { background:var(--card); color:var(--text); }
  .cpd-action-del:hover { color:#c0392b; border-color:#f0b4b4; background:#fdf0f0; }

  /* CPD guidance sidebar */
  .cpd-guide-section { margin-bottom:14px; }
  .cpd-guide-label {
    font-family:'DM Mono',monospace;font-size:9px;font-weight:700;
    letter-spacing:.11em;text-transform:uppercase;color:var(--rics-bright);
    margin-bottom:5px;
  }
  .cpd-guide-text { font-size:11.5px; color:var(--muted); line-height:1.65; }
  .cpd-guide-text strong { color:var(--text); }

  /* ── MODERN FORM FIELDS (CPD + CV forms) ── */
  .field-section {
    margin-bottom: 20px;
  }
  .field-section-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: .13em;
    text-transform: uppercase;
    color: var(--rics-bright);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--rics-border);
    display: block;
  }
  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }
  .field-row.full { grid-template-columns: 1fr; }
  .field-row.trio { grid-template-columns: 1fr 1fr 1fr; }
  .field-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .field-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--faint);
  }
  .field-label .req { color: var(--rics); margin-left: 2px; }
  .field-input, .field-select, .field-textarea {
    padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    color: var(--text);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    transition: border-color .13s, background .13s;
    width: 100%;
    box-sizing: border-box;
  }
  .field-input:focus, .field-select:focus, .field-textarea:focus {
    border-color: var(--accent);
    background: var(--surface);
    outline: none;
  }
  .field-input::placeholder, .field-textarea::placeholder { color: var(--faint); }
  .field-textarea { min-height: 88px; resize: vertical; line-height: 1.6; }
  .field-select { cursor: pointer; }
  .field-hint {
    font-size: 10px;
    color: var(--faint);
    font-family: 'DM Sans', sans-serif;
    line-height: 1.4;
    margin-top: 1px;
  }
  .form-panel {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 22px 24px 20px;
    margin-bottom: 20px;
    animation: fadeUp .2s ease;
  }
  .form-panel.editing { border-color: var(--rics-border); }
  .form-panel-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 12px;
  }
  .form-panel-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    margin: 0;
  }
  .form-panel-subtitle {
    font-size: 11.5px;
    color: var(--muted);
    margin-top: 3px;
    font-family: 'DM Sans', sans-serif;
  }
  .form-close-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    width: 30px;
    height: 30px;
    font-size: 14px;
    cursor: pointer;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all .12s;
  }
  .form-close-btn:hover { background: var(--card); color: var(--text); border-color: var(--border2); }
  .form-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 18px 0;
  }
  .toggle-pill {
    display: inline-flex;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    width: 100%;
  }
  .toggle-pill-opt {
    flex: 1;
    text-align: center;
    padding: 8px 6px;
    font-size: 11px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    color: var(--muted);
    transition: all .13s;
    border: none;
    background: none;
  }
  .toggle-pill-opt.active {
    background: var(--acc-bg);
    color: var(--accent);
  }
  .toggle-pill-opt.active-rics {
    background: var(--rics-bg);
    color: var(--rics);
  }

  @media(max-width:860px){
    .cpd-layout{ grid-template-columns:1fr; }
    .cpd-side{ position:static;height:auto;border:none; }
    .cpd-form-grid{ grid-template-columns:1fr; }
    .section-tabs-bar{ overflow-x:auto; }
  }


  @media(max-width:768px){
    header{padding:0 14px;height:auto;min-height:52px;flex-wrap:wrap;gap:6px;padding-top:8px;padding-bottom:8px}
    .logo img{height:34px}
    .logo-tagline{display:none}
    .header-btns{gap:4px}
    .header-btn{font-size:10px!important;padding:5px 8px!important}
    .progress-wrap{display:none}
    #header-progress-inner{flex-wrap:wrap}
    .choice-grid{flex-direction:column;align-items:stretch}
    .choice-card{max-width:100%}
  }
  @media(max-width:480px){
    .header-btns .btn-ghost{display:none}
    .logo img{height:30px}
  }
</style>
</head>
