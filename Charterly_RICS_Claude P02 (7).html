function rSubmission(C) {
  const wrap = document.createElement("div");
  wrap.className = "page-centre";
  C.appendChild(wrap);

  const dl     = getDesigLabel();
  const comps  = buildAllComps();
  const csn    = cw(S.caseStudy);
  const prog   = calcProgress();
  const cpdEntries = S.cpd || [];
  const { formal, informal } = (() => {
    const f = cpdEntries.filter(e=>e.structured==="Structured");
    const i = cpdEntries.filter(e=>e.structured==="Unstructured");
    return { formal:f, informal:i };
  })();
  const fHrs = cpdEntries.filter(e=>e.structured==="Structured").reduce((a,e)=>a+(+e.hours||0)+(+e.mins||0)/60,0);
  const iHrs = cpdEntries.filter(e=>e.structured==="Unstructured").reduce((a,e)=>a+(+e.hours||0)+(+e.mins||0)/60,0);
  const total = fHrs + iHrs;
  const fPct  = total>0?(fHrs/total)*100:0;
  const iPct  = total>0?(iHrs/total)*100:0;
  const cpdOk = cpdEntries.length>=2 && fPct>=50 && iPct>=50;
  const stmtsOk = comps.filter(c=>isCompleted(c.id)).length === comps.length;

  const rpqMode = isRPQRoute();
  const checkItems = rpqMode ? [
    ["CPD Logbook (at least 1 entry)", (S.cpd||[]).length > 0],
    ["Professional CV (at least 1 entry)", (S.cv||[]).length > 0],
  ] : [
    ["Pathway selected",    !!S.pathway],
    ["Competencies selected", !!(S.sel?.core?.length || S.sel?.tech)],
    ["All statements marked complete", stmtsOk],
    ["Case Study (≥1,500 words)", csn>=1500],
    ["CPD balance (≥50% each)", cpdOk],
  ];

  wrap.innerHTML = `
    <h1 class="page-title" style="margin-bottom:6px">Submission</h1>
    <p class="sub" style="margin-bottom:24px">Review your submission summary and download your documents.</p>

    ${rpqMode ? `<div style="background:#ede9f2;border:1px solid #b3a3c0;border-radius:10px;padding:13px 16px;margin-bottom:20px;font-size:13px;color:#503D5C;line-height:1.6">
      📋 <strong>RPQ Direct Entry route</strong> — your submission requires a <strong>CPD record</strong> and <strong>Professional CV</strong> only. Competency statements and case study are not required.
    </div>` : ''}

    <div class="card" style="margin-bottom:20px;padding:20px 24px">
      <h2 class="section-title" style="margin-bottom:14px">Readiness Checklist</h2>
      ${checkItems.map(([label, ok])=>`
        <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:16px">${ok?"✅":"⬜"}</span>
          <span style="font-size:13px;color:${ok?"var(--text)":"var(--muted)"};">${label}</span>
          ${ok?'<span style="margin-left:auto;font-size:11px;color:#2e7d52;font-weight:600">Done</span>':'<span style="margin-left:auto;font-size:11px;color:#b5651d;font-weight:600">Pending</span>'}
        </div>
      `).join("")}
    </div>

    </div>

    <div class="card" style="margin-bottom:20px;padding:20px 24px">
      <h2 class="section-title" style="margin-bottom:8px">Download Documents</h2>
      <p style="font-size:13px;color:var(--muted);margin-bottom:16px">Download your submission files for review and upload to the RICS portal.</p>
      <div style="display:flex;flex-wrap:wrap;gap:10px">
        
        <button class="btn btn-export" onclick="exportJSON()" style="font-size:13px">
          ⬇ Session (.json)
        </button>
        <button class="btn btn-export" onclick="cpdDownloadCSV()" style="font-size:13px">
          ⬇ CPD Log (.csv)
        </button>
        <button class="btn btn-primary" onclick="exportWordDoc()"
          style="font-size:13px;background:var(--rics);transition:background .15s">
          ⬇ Submission (.docx)
        </button>
      </div>
    </div>

    <div class="btn-row" style="margin-top:8px">
      <button class="btn btn-ghost" onclick="goStep(3)">← Back to Submission Documents</button>
    </div>
  `;
}

// ── Word document export (docxtemplater-free, pure XML approach) ─────────────
function exportWordDoc() {
  showAIModal(() => _buildWordDoc());
}

function _buildWordDoc() {
  const dl    = getDesigLabel();
  const comps = buildAllComps();
  const date  = new Date().toLocaleDateString("en-GB");
  const ps    = []; // paragraph accumulator

  // ── Colour constants (RICS brand palette) ──────────────────────────────
  const RICS_PURPLE  = "503D5C";  // deep purple
  const RICS_LIGHT   = "E8E0EE";  // pale purple tint for shaded cells
  const RICS_MID     = "6F597A";  // mid purple for sub-headings
  const GREY_LIGHT   = "F2F2F2";  // alternating row tint
  const WHITE        = "FFFFFF";

  // ── XML helpers ────────────────────────────────────────────────────────
  const x = xmlEsc;

  // Paragraph with full property object
  const para = (runs, pPrXml="") =>
    `<w:p>${pPrXml ? `<w:pPr>${pPrXml}</w:pPr>` : ""}${runs}</w:p>`;

  // Run with optional rPr XML
  const run = (text, rPrXml="") =>
    text === "" ? "" :
    `<w:r>${rPrXml ? `<w:rPr>${rPrXml}</w:rPr>` : ""}<w:t xml:space="preserve">${x(text)}</w:t></w:r>`;

  // Shading element
  const shade = (fill) =>
    `<w:shd w:val="clear" w:color="auto" w:fill="${fill}"/>`;

  // Indent
  const indent = (left) => `<w:ind w:left="${left}"/>`;

  // Spacing
  const spacing = (before, after, line) =>
    `<w:spacing w:before="${before}" w:after="${after}"${line ? ` w:line="${line}" w:lineRule="auto"` : ""}/>`;

  // ── Heading helpers ─────────────────────────────────────────────────────
  const addH1 = t => ps.push(para(
    run(t, `<w:color w:val="${WHITE}"/><w:b/><w:sz w:val="28"/><w:szCs w:val="28"/>`),
    `<w:pStyle w:val="RICSHeading1"/>${spacing(320,160)}`
  ));

  const addH2 = t => ps.push(para(
    run(t, `<w:color w:val="${RICS_PURPLE}"/><w:b/><w:sz w:val="24"/><w:szCs w:val="24"/>`),
    `<w:pStyle w:val="RICSHeading2"/>${spacing(280,80)}`
  ));

  const addH3 = t => ps.push(para(
    run(t, `<w:color w:val="${RICS_MID}"/><w:b/><w:i/><w:sz w:val="22"/><w:szCs w:val="22"/>`),
    `${spacing(160,60)}`
  ));

  const addPara = (t, indentLeft=0) => {
    const lines = (t||"").split("\n");
    lines.forEach(line => {
      ps.push(para(
        run(line || " ", `<w:sz w:val="22"/><w:szCs w:val="22"/>`),
        `${spacing(0,80)}${indentLeft ? indent(indentLeft) : ""}`
      ));
    });
  };

  const addBlank = (n=1) => {
    for (let i=0;i<n;i++) ps.push(para(run(" ", `<w:sz w:val="14"/>`), spacing(0,0)));
  };

  // ── Horizontal rule (border paragraph) ─────────────────────────────────
  const addRule = (color=RICS_PURPLE, space=4) => ps.push(
    `<w:p><w:pPr><w:pBdr><w:bottom w:val="single" w:sz="6" w:space="${space}" w:color="${color}"/></w:pBdr>${spacing(120,120)}</w:pPr></w:p>`
  );

  // ── Table helpers ───────────────────────────────────────────────────────
  // Simple 2-column key-value row
  const tblRow2 = (label, value, shade1=RICS_LIGHT, shade2=WHITE, bold1=true) =>
    `<w:tr>
      <w:tc><w:tcPr><w:tcW w:w="2800" w:type="dxa"/>${shade ? `<w:shd w:val="clear" w:color="auto" w:fill="${shade1}"/>` : ""}<w:tcBorders><w:top w:val="single" w:sz="4" w:color="${RICS_PURPLE}"/><w:bottom w:val="single" w:sz="4" w:color="${RICS_PURPLE}"/><w:left w:val="single" w:sz="4" w:color="${RICS_PURPLE}"/><w:right w:val="single" w:sz="4" w:color="${RICS_PURPLE}"/></w:tcBorders></w:tcPr>
        <w:p><w:pPr><w:spacing w:before="60" w:after="60"/></w:pPr><w:r><w:rPr>${bold1 ? "<w:b/>" : ""}<w:sz w:val="20"/><w:szCs w:val="20"/></w:rPr><w:t xml:space="preserve">${x(label)}</w:t></w:r></w:p></w:tc>
      <w:tc><w:tcPr><w:tcW w:w="6500" w:type="dxa"/><w:shd w:val="clear" w:color="auto" w:fill="${shade2}"/><w:tcBorders><w:top w:val="single" w:sz="4" w:color="${RICS_PURPLE}"/><w:bottom w:val="single" w:sz="4" w:color="${RICS_PURPLE}"/><w:left w:val="single" w:sz="4" w:color="${RICS_PURPLE}"/><w:right w:val="single" w:sz="4" w:color="${RICS_PURPLE}"/></w:tcBorders></w:tcPr>
        <w:p><w:pPr><w:spacing w:before="60" w:after="60"/></w:pPr><w:r><w:rPr><w:sz w:val="20"/><w:szCs w:val="20"/></w:rPr><w:t xml:space="preserve">${x(value)}</w:t></w:r></w:p></w:tc>
    </w:tr>`;

  const wrapTable = (rows) =>
    `<w:tbl><w:tblPr><w:tblStyle w:val="TableGrid"/><w:tblW w:w="9300" w:type="dxa"/><w:tblBorders><w:insideH w:val="single" w:sz="4" w:color="${RICS_PURPLE}"/><w:insideV w:val="single" w:sz="4" w:color="${RICS_PURPLE}"/></w:tblBorders></w:tblPr>${rows}</w:tbl>`;

  // ── PAGE BREAK ──────────────────────────────────────────────────────────
  const addPageBreak = () => ps.push(
    `<w:p><w:r><w:br w:type="page"/></w:r></w:p>`
  );

  // ════════════════════════════════════════════════════════════════════════
  if (S.body !== "CICES") {
    // COVER PAGE
    // ════════════════════════════════════════════════════════════════════════
  
    // Purple title banner — simulated with a shaded para
    ps.push(`<w:p><w:pPr><w:shd w:val="clear" w:color="auto" w:fill="${RICS_PURPLE}"/>${spacing(360,80)}</w:pPr>` +
      run("RICS APC", `<w:color w:val="${WHITE}"/><w:b/><w:sz w:val="56"/><w:szCs w:val="56"/>`) +
    `</w:p>`);
    ps.push(`<w:p><w:pPr><w:shd w:val="clear" w:color="auto" w:fill="${RICS_PURPLE}"/>${spacing(0,360)}</w:pPr>` +
      run("Submission Document", `<w:color w:val="E8E0EE"/><w:sz w:val="32"/><w:szCs w:val="32"/>`) +
    `</w:p>`);
  
    addBlank(2);
  
    // Candidate info table
    ps.push(wrapTable([
      tblRow2("Pathway / Designation", dl),
      tblRow2("Professional Body",     S.body || "RICS"),
      tblRow2("Document Generated",    date),
      tblRow2("Submission Status",     "DRAFT — For review only"),
    ]));
  
    addBlank(2);
  
    // Disclaimer box
    ps.push(`<w:p><w:pPr><w:shd w:val="clear" w:color="auto" w:fill="${RICS_LIGHT}"/><w:pBdr><w:left w:val="single" w:sz="12" w:color="${RICS_PURPLE}"/></w:pBdr>${spacing(120,60)}</w:pPr>` +
      run("AI Integrity Declaration: ", `<w:b/><w:sz w:val="20"/><w:color w:val="${RICS_PURPLE}"/>`) +
      run("I confirm that all competency statements, case study and CPD records in this submission reflect my own genuine professional experience and were written by me. Any use of AI tools was limited to grammar checking or formatting only.", `<w:sz w:val="20"/><w:color w:val="404040"/>`) +
    `</w:p>`);
  
    addPageBreak();
  
    // ════════════════════════════════════════════════════════════════════════
    // SECTION: COMPETENCY STATEMENTS
    // ════════════════════════════════════════════════════════════════════════
  
    // Section banner
    ps.push(`<w:p><w:pPr><w:shd w:val="clear" w:color="auto" w:fill="${RICS_PURPLE}"/>${spacing(240,120)}</w:pPr>` +
      run("Section 1 — Competency Statements", `<w:color w:val="${WHITE}"/><w:b/><w:sz w:val="28"/><w:szCs w:val="28"/>`) +
    `</w:p>`);
    addBlank();
  
    const cats = ["Mandatory","Core","Core — Measurement","Specialism","Optional","Technical"];
    cats.forEach(cat => {
      const cc = comps.filter(c => c.cat === cat);
      if (!cc.length) return;
  
      // Category heading with underline rule
      addH2(cat + " Competencies");
      addRule(RICS_MID, 2);
      addBlank();
  
      cc.forEach(comp => {
        // Competency header row — shaded
        ps.push(`<w:p><w:pPr><w:shd w:val="clear" w:color="auto" w:fill="${RICS_LIGHT}"/><w:pBdr><w:left w:val="single" w:sz="12" w:color="${RICS_PURPLE}"/></w:pBdr>${spacing(120,60)}</w:pPr>` +
          run(`${comp.id}`, `<w:b/><w:sz w:val="24"/><w:szCs w:val="24"/><w:color w:val="${RICS_PURPLE}"/>`) +
          run(`  ${comp.name}`, `<w:b/><w:sz w:val="24"/><w:szCs w:val="24"/>`) +
          run(`  ·  Required Level ${comp.req}`, `<w:sz w:val="20"/><w:color w:val="${RICS_MID}"/>`) +
        `</w:p>`);
  
        for (let l = 1; l <= comp.req; l++) {
          const key = `${comp.id}_L${l}`;
          const txt = S.statements[key] || "";
          const wc  = txt.trim() ? txt.trim().split(/\s+/).length : 0;
  
          // Level label
          ps.push(para(
            run(`Level ${l}`, `<w:b/><w:sz w:val="22"/><w:szCs w:val="22"/><w:color w:val="${RICS_MID}"/>`) +
            run(`   (${wc} words)`, `<w:sz w:val="18"/><w:color w:val="888888"/>`),
            spacing(120, 40)
          ));
  
          // Statement text
          if (txt.trim()) {
            addPara(txt, 360);
          } else {
            ps.push(para(
              run("[Not yet written]", `<w:sz w:val="22"/><w:color w:val="AAAAAA"/><w:i/>`),
              `${indent(360)}${spacing(0,80)}`
            ));
          }
          addBlank();
        }
        addRule(RICS_LIGHT, 1);
        addBlank();
      });
      addPageBreak();
    });
  
    // ════════════════════════════════════════════════════════════════════════
    // SECTION: CASE STUDY
    // ════════════════════════════════════════════════════════════════════════
  
    ps.push(`<w:p><w:pPr><w:shd w:val="clear" w:color="auto" w:fill="${RICS_PURPLE}"/>${spacing(240,120)}</w:pPr>` +
      run("Section 2 — Case Study", `<w:color w:val="${WHITE}"/><w:b/><w:sz w:val="28"/><w:szCs w:val="28"/>`) +
    `</w:p>`);
    addBlank();
  
    const csText  = S.caseStudy || "";
    const csWords = csText.trim() ? csText.trim().split(/\s+/).length : 0;
  
    ps.push(para(
      run(`Word count: ${csWords} / 3,000`, `<w:sz w:val="20"/><w:color w:val="${csWords >= 1500 ? "2e7d52" : "b5651d"}"/>`),
      spacing(0, 120)
    ));
  
    if (csText.trim()) {
      addPara(csText);
    } else {
      ps.push(para(run("[Case Study not yet written]", `<w:sz w:val="22"/><w:color w:val="AAAAAA"/><w:i/>`)));
    }
  
    if (S.appendices && S.appendices.length) {
      addBlank(2);
      addH3("Appendices");
      S.appendices.forEach(img => {
        ps.push(para(
          run(`${img.label}:  `, `<w:b/><w:sz w:val="22"/><w:szCs w:val="22"/>`) +
          run(img.name + "  [image file — refer to HTML export]", `<w:color w:val="666666"/><w:sz w:val="22"/><w:szCs w:val="22"/>`) +
          (img.title ? run("  " + img.title, `<w:i/><w:color w:val="444444"/><w:sz w:val="22"/><w:szCs w:val="22"/>`) : ""),
          `${indent(360)}${spacing(40,40)}`
        ));
      });
    }
  
    addPageBreak();
  
    // ════════════════════════════════════════════════════════════════════════
    // SECTION: CPD LOG
    // ════════════════════════════════════════════════════════════════════════
  
    ps.push(`<w:p><w:pPr><w:shd w:val="clear" w:color="auto" w:fill="${RICS_PURPLE}"/>${spacing(240,120)}</w:pPr>` +
      run("Section 3 — CPD Log", `<w:color w:val="${WHITE}"/><w:b/><w:sz w:val="28"/><w:szCs w:val="28"/>`) +
    `</w:p>`);
    addBlank();
  
    if (S.cpd && S.cpd.length) {
      // CPD summary table
      const formalEntries   = S.cpd.filter(e => e.structured === "Structured");
      const informalEntries = S.cpd.filter(e => e.structured !== "Structured");
      const totalHrs = (arr) => arr.reduce((a,e) => a + (+(e.hours||0)) + (+(e.mins||0))/60, 0);
      const fHrs = totalHrs(formalEntries);
      const iHrs = totalHrs(informalEntries);
      const tHrs = fHrs + iHrs;
      const fPct = tHrs > 0 ? ((fHrs/tHrs)*100).toFixed(0) : 0;
  
      ps.push(wrapTable([
        tblRow2("Total CPD Hours",   tHrs.toFixed(1) + "h", RICS_LIGHT, WHITE),
        tblRow2("Formal (Structured)",   fHrs.toFixed(1) + "h  (" + fPct + "%)", RICS_LIGHT, WHITE),
        tblRow2("Informal (Unstructured)", iHrs.toFixed(1) + "h  (" + (100 - +fPct) + "%)", RICS_LIGHT, WHITE),
        tblRow2("Entries Recorded",  String(S.cpd.length), RICS_LIGHT, WHITE),
        tblRow2("48h Requirement",   tHrs >= 48 ? "\u2705 Met" : "\u26A0 Not yet met (" + (48-tHrs).toFixed(1) + "h remaining)", RICS_LIGHT, WHITE),
        tblRow2("50% Formal Req.",   fHrs >= 24 ? "\u2705 Met" : "\u26A0 Not yet met (need " + (24-fHrs).toFixed(1) + "h more)", RICS_LIGHT, WHITE),
      ]));
  
      addBlank(2);
  
      // Individual entries
      S.cpd.forEach((e, i) => {
        const dur = `${e.hours||0}h ${e.mins||0}m`;
        const isF = e.structured === "Structured";
  
        ps.push(`<w:p><w:pPr><w:shd w:val="clear" w:color="auto" w:fill="${isF ? RICS_LIGHT : GREY_LIGHT}"/><w:pBdr><w:left w:val="single" w:sz="12" w:color="${isF ? RICS_PURPLE : "AAAAAA"}"/></w:pBdr>${spacing(100,40)}</w:pPr>` +
          run(`${i+1}.  `, `<w:b/><w:sz w:val="22"/><w:color w:val="${RICS_PURPLE}"/>`) +
          run(e.title || "(Untitled)", `<w:b/><w:sz w:val="22"/>`) +
          run(`   ·  ${dur}  ·  ${e.structured||"—"}  ·  ${e.status||"—"}`, `<w:sz w:val="20"/><w:color w:val="666666"/>`) +
        `</w:p>`);
        if (e.startDate) {
          ps.push(para(run(`Date: ${e.startDate}  ·  Type: ${e.activityType||"—"}`, `<w:sz w:val="20"/><w:color w:val="888888"/>`), `${indent(360)}${spacing(0,40)}`));
        }
        if (e.outcome) {
          ps.push(para(run("Learning Outcome: ", `<w:b/><w:sz w:val="20"/>`) + run(e.outcome, `<w:sz w:val="20"/>`), `${indent(360)}${spacing(0,40)}`));
        }
        addBlank();
      });
    } else {
      ps.push(para(run("[No CPD entries recorded]", `<w:sz w:val="22"/><w:color w:val="AAAAAA"/><w:i/>`)));
    }
  
  
  }


    // ════════════════════════════════════════════════════════════════════════
  // ASSEMBLE DOCUMENT XML
  // ════════════════════════════════════════════════════════════════════════

  const bodyXml = ps.join("\n");
  const docXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document
  xmlns:wpc="http://schemas.microsoft.com/office/word/2010/wordprocessingCanvas"
  xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"
  xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"
  xmlns:w14="http://schemas.microsoft.com/office/word/2010/wordml">
<w:body>
${bodyXml}
<w:sectPr>
  <w:pgSz w:w="11906" w:h="16838"/>
  <w:pgMar w:top="1134" w:right="1134" w:bottom="1134" w:left="1701" w:header="709" w:footer="709" w:gutter="0"/>
  <w:cols w:space="720"/>
</w:sectPr>
</w:body>
</w:document>`;

  // ── Styles XML: RICS branded ────────────────────────────────────────────
  const stylesXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main" xmlns:w14="http://schemas.microsoft.com/office/word/2010/wordml">

  <w:docDefaults>
    <w:rPrDefault><w:rPr>
      <w:rFonts w:ascii="Arial" w:hAnsi="Arial" w:cs="Arial"/>
      <w:sz w:val="22"/><w:szCs w:val="22"/>
      <w:lang w:val="en-GB"/>
    </w:rPr></w:rPrDefault>
  </w:docDefaults>

  <w:style w:type="paragraph" w:default="1" w:styleId="Normal">
    <w:name w:val="Normal"/>
    <w:pPr><w:spacing w:after="120"/></w:pPr>
    <w:rPr><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/><w:sz w:val="22"/></w:rPr>
  </w:style>

  <w:style w:type="paragraph" w:styleId="RICSHeading1">
    <w:name w:val="RICS Heading 1"/>
    <w:basedOn w:val="Normal"/>
    <w:pPr>
      <w:shd w:val="clear" w:color="auto" w:fill="503D5C"/>
      <w:spacing w:before="320" w:after="160"/>
    </w:pPr>
    <w:rPr>
      <w:rFonts w:ascii="Arial" w:hAnsi="Arial"/>
      <w:b/><w:color w:val="FFFFFF"/>
      <w:sz w:val="28"/><w:szCs w:val="28"/>
    </w:rPr>
  </w:style>

  <w:style w:type="paragraph" w:styleId="RICSHeading2">
    <w:name w:val="RICS Heading 2"/>
    <w:basedOn w:val="Normal"/>
    <w:pPr><w:spacing w:before="280" w:after="80"/></w:pPr>
    <w:rPr>
      <w:rFonts w:ascii="Arial" w:hAnsi="Arial"/>
      <w:b/><w:color w:val="503D5C"/>
      <w:sz w:val="24"/><w:szCs w:val="24"/>
    </w:rPr>
  </w:style>

  <w:style w:type="table" w:styleId="TableGrid">
    <w:name w:val="Table Grid"/>
    <w:tblPr>
      <w:tblBorders>
        <w:top    w:val="single" w:sz="4" w:color="503D5C"/>
        <w:left   w:val="single" w:sz="4" w:color="503D5C"/>
        <w:bottom w:val="single" w:sz="4" w:color="503D5C"/>
        <w:right  w:val="single" w:sz="4" w:color="503D5C"/>
        <w:insideH w:val="single" w:sz="4" w:color="503D5C"/>
        <w:insideV w:val="single" w:sz="4" w:color="503D5C"/>
      </w:tblBorders>
    </w:tblPr>
  </w:style>

</w:styles>`;

  const relXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>
</Relationships>`;

  const wordRelXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>
</Relationships>`;

  const contentTypes = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml"  ContentType="application/xml"/>
  <Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
  <Override PartName="/word/styles.xml"   ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/>
</Types>`;


  // Collect images: case study appendices + experience report appendices
  const allImages = [
    ...(S.appendices||[]).map(a=>({...a, prefix:"csimg"})),
    ...(S.erAppendices||[]).map(a=>({...a, prefix:"erimg"}))
  ];

  _downloadDocx(docXml, relXml, wordRelXml, stylesXml, contentTypes, dl, allImages);
}

function xmlEsc(s) {
  return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&apos;");
}

function _downloadDocx(docXml, relXml, wordRelXml, stylesXml, contentTypes, dl, images=[]) {
  // Load JSZip dynamically if not present
  if (typeof JSZip === "undefined") {
    const script = document.createElement("script");
    script.src = "https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js";
    script.onload = () => _buildZip(docXml, relXml, wordRelXml, stylesXml, contentTypes, dl, images);
    script.onerror = () => alert("Could not load JSZip. Please check your internet connection.");
    document.head.appendChild(script);
  } else {
    _buildZip(docXml, relXml, wordRelXml, stylesXml, contentTypes, dl, images);
  }
}

function _buildZip(docXml, relXml, wordRelXml, stylesXml, contentTypes, dl, images=[]) {
  // Build image relationships and patch document/contentTypes XMLs
  let patchedDocXml     = docXml;
  let patchedWordRel    = wordRelXml;
  let patchedCTypes     = contentTypes;

  const imageRels = [];
  images.forEach((img, i) => {
    const rId  = "rId" + (10 + i);  // rId10, rId11, … (rId1 is styles)
    const ext  = img.dataUrl.startsWith("data:image/png") ? "png" : "jpeg";
    const mime = ext === "png" ? "image/png" : "image/jpeg";
    const fname = "media/img" + i + "." + ext;
    imageRels.push({ rId, fname, mime, ext, img });
  });

  if (imageRels.length) {
    // Patch word relationships
    const newRels = imageRels.map(r =>
      `  <Relationship Id="${r.rId}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="${r.fname}"/>`
    ).join("\n");
    patchedWordRel = patchedWordRel.replace("</Relationships>", newRels + "\n</Relationships>");

    // Patch content types — add image defaults if not present
    const extsNeeded = [...new Set(imageRels.map(r=>r.ext))];
    const ctPatches = extsNeeded.map(ext => {
      const mime = ext === "png" ? "image/png" : "image/jpeg";
      return `  <Default Extension="${ext}" ContentType="${mime}"/>`;
    }).join("\n");
    patchedCTypes = patchedCTypes.replace("</Types>", ctPatches + "\n</Types>");

    // Replace placeholder text refs in docXml with actual inline image XML
    imageRels.forEach(r => {
      const { rId, img } = r;
      // Each image was added as a text placeholder – now replace with drawing
      // EMU: 1px ≈ 9525 EMU; target max width ~14cm = 5039370 EMU
      const maxWidthEmu = 5039370;
      const maxHeightEmu = 3779528; // ~10cm
      const drawing = `<w:p><w:pPr><w:jc w:val="center"/><w:spacing w:before="120" w:after="120"/></w:pPr>` +
        `<w:r><w:rPr/><w:drawing>` +
        `<wp:inline xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing" distT="0" distB="0" distL="0" distR="0">` +
        `<wp:extent cx="${maxWidthEmu}" cy="${maxHeightEmu}"/>` +
        `<wp:effectExtent l="0" t="0" r="0" b="0"/>` +
        `<wp:docPr id="${10+imageRels.indexOf(r)}" name="${img.label}"/>` +
        `<wp:cNvGraphicFramePr><a:graphicFrameLocks xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" noChangeAspect="1"/></wp:cNvGraphicFramePr>` +
        `<a:graphic xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main">` +
        `<a:graphicData uri="http://schemas.openxmlformats.org/drawingml/2006/picture">` +
        `<pic:pic xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture">` +
        `<pic:nvPicPr><pic:cNvPr id="${10+imageRels.indexOf(r)}" name="${img.label}"/><pic:cNvPicPr/></pic:nvPicPr>` +
        `<pic:blipFill><a:blip r:embed="${rId}"/><a:stretch><a:fillRect/></a:stretch></pic:blipFill>` +
        `<pic:spPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="${maxWidthEmu}" cy="${maxHeightEmu}"/></a:xfrm>` +
        `<a:prstGeom prst="rect"><a:avLst/></a:prstGeom></pic:spPr>` +
        `</pic:pic></a:graphicData></a:graphic></wp:inline></w:drawing></w:r></w:p>`;
      // Replace the placeholder text paragraph for this image.
      // Regex matches the paragraph regardless of whether an optional title run follows.
      const captionText = img.title ? `${img.label} — ${img.title}` : img.label;
      const caption = `<w:p><w:pPr><w:jc w:val="center"/><w:spacing w:before="60" w:after="180"/></w:pPr>` +
        `<w:r><w:rPr><w:b/><w:color w:val="503D5C"/><w:sz w:val="18"/><w:szCs w:val="18"/></w:rPr>` +
        `<w:t>${xmlEsc(captionText)}</w:t></w:r></w:p>`;
      const labelRe = img.label.replace(".", "[.]");
      patchedDocXml = patchedDocXml.replace(
        new RegExp(
          "<w:p><w:pPr><w:ind[^/]*/><w:spacing[^/]*/></w:pPr>" +
          "<w:r><w:rPr><w:b/><w:sz[^/]*/><w:szCs[^/]*/></w:rPr><w:t[^>]*>" + labelRe + ":[^<]*</w:t></w:r>" +
          "<w:r><w:rPr><w:color[^/]*/><w:sz[^/]*/><w:szCs[^/]*/></w:rPr><w:t[^>]*>[^<]*refer to HTML[^<]*</w:t></w:r>" +
          "(?:<w:r>.*?</w:r>)*" +
          "</w:p>",
          "s"
        ),
        drawing + caption
      );
    });
  }

  // Add document namespace for drawing if images present
  if (imageRels.length && !patchedDocXml.includes("xmlns:wp=")) {
    patchedDocXml = patchedDocXml.replace(
      'xmlns:w14="http://schemas.microsoft.com/office/word/2010/wordml">',
      'xmlns:w14="http://schemas.microsoft.com/office/word/2010/wordml" xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture">'
    );
  }

  const zip = new JSZip();
  zip.file("[Content_Types].xml", patchedCTypes);
  zip.file("_rels/.rels",          relXml);
  zip.file("word/document.xml",    patchedDocXml);
  zip.file("word/_rels/document.xml.rels", patchedWordRel);
  zip.file("word/styles.xml",      stylesXml);

  // Add image binaries
  imageRels.forEach(r => {
    const b64 = r.img.dataUrl.split(",")[1];
    zip.file("word/" + r.fname, b64, {base64: true});
  });

  zip.generateAsync({type:"blob", mimeType:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"})
    .then(blob => {
      const a = document.createElement("a");
      const name = "RICS_APC_Submission_" + new Date().toISOString().slice(0,10) + ".docx";
      a.href = URL.createObjectURL(blob);
      a.download = name;
      a.click();
      URL.revokeObjectURL(a.href);
    });
}


// ══════════════════════════════════════════════ AI INTEGRITY MODAL ═══════════

const AI_MODAL_TEXT = `All assessment submissions must be your own original work. Use of artificial intelligence (AI) software to generate content for submissions is not permitted.

Candidates may use tools to aid with spelling, grammar and word count. Candidates who need specific support or who have identified needs should submit a reasonable adjustment application for any other form of technological aid approval.

Candidates must not use generative AI software (e.g. ChatGPT) in the production of their assessment submission.

RICS will carry out plagiarism and AI detection checks for all submissions. If there are suspicions that a candidate has submitted work that is not their own, they will be subject to investigation and possible RICS Regulatory action.`;

// Steps that require the AI integrity modal (shown once per session per step)
const AI_MODAL_STEPS = new Set();

function showAIModal(onConfirm) {
  // Build overlay
  const overlay = document.createElement("div");
  overlay.className = "ai-modal-overlay";

  // Format body text: split paragraphs, bold the last two sentences
  const paras = AI_MODAL_TEXT.trim().split("\n\n");
  const bodyHtml = paras.map((p, i) => {
    if (i === paras.length - 1) {
      // Last paragraph — highlight key warning
      return `<p style="margin:0;margin-top:10px"><em>${p}</em></p>`;
    }
    if (i === 0) return `<p style="margin:0"><strong>${p}</strong></p>`;
    return `<p style="margin:0;margin-top:10px">${p}</p>`;
  }).join("");

  const _aiCls = "ai-modal";
  overlay.innerHTML = `
    <div class="${_aiCls}">
      <div class="ai-modal-badge">⚠ Academic Integrity Notice</div>
      <div class="ai-modal-title">AI & Plagiarism Policy</div>
      <div class="ai-modal-body">${bodyHtml}</div>
      <div class="ai-modal-footer">
        <button class="ai-modal-understand" id="ai-modal-confirm">I Understand</button>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);

  // Prevent background scroll
  document.body.style.overflow = "hidden";

  // Confirm button
  overlay.querySelector("#ai-modal-confirm").addEventListener("click", () => {
    overlay.remove();
    document.body.style.overflow = "";
    if (onConfirm) onConfirm();
  });
}

function goStepWithModal(n) {
  // Steps 3 (Statements) and 4 (Case Study) show the modal once per session
  if ((n === 3 || n === 4) && !AI_MODAL_STEPS.has(n)) {
    AI_MODAL_STEPS.add(n);
    showAIModal(() => { goStep(n); });
  } else {
    goStep(n);
  }
}

// ════════════════════════════════════════════════════════════ RENDER ══════════

function goStep(n) { S.step=n; saveState(); render(); }

function render() {
  try {
    // ── RPQ route guard: redirect away from steps 1 & 2 ──────────────────────
    if (isRPQRoute() && (S.step === 1 || S.step === 2)) {
      S.step = 3;
      S.activeSection = S.activeSection === 'casestudy' || S.activeSection === 'mandatory' || S.activeSection === 'technical'
        ? 'cpd' : S.activeSection;
      saveState();
    }

    const mainEl = document.getElementById("main");
    mainEl.innerHTML = "";
    const stepbarEl = document.querySelector(".stepbar");
    if (stepbarEl) stepbarEl.style.display = (S.step === -1 || S.step === 0) ? "none" : "flex";

    // Hide main header on Pathway Guidance page; show on all others
    const headerEl = document.querySelector("header");
    

    const rpq = isRPQRoute();
    document.body.classList.toggle("rpq-mode", rpq);
    document.querySelectorAll(".step-item[data-step]").forEach(el => {
      const s=+el.dataset.step;
      // For RPQ users, steps 1 (Pathway) and 2 (Competencies) are locked
      if (rpq && (s === 1 || s === 2)) {
        el.className = "step-item step-locked";
        el.onclick = null;
        el.title = "Not required for RPQ Direct Entry";
      } else if (s === 5) {
        // Submission step — enable once candidate has reached Submission Documents (step 3)
        const canAccess = S.step >= 3;
        el.className = "step-item" + (S.step === 5 ? " active" : canAccess ? " done" : "");
        el.onclick = canAccess ? () => goToSubmission() : null;
        el.style.cursor = canAccess ? "pointer" : "default";
        el.title = canAccess ? "Go to Submission" : "Complete Submission Documents first";
      } else {
        el.className="step-item"+(s===S.step?" active":s<S.step?" done":"");
        el.onclick = s<=S.step ? ()=>goStepWithModal(s) : null;
        el.title = "";
      }
    });
    document.querySelectorAll(".step-elig").forEach(el => {
      const isStart = el.textContent.includes("Start");
      const isElig  = el.textContent.includes("Eligibility");
      if (isStart && S.step >= 1)  el.classList.add("done");
      if (isElig  && S.step >= 1)  el.classList.add("done");
    });
    const ph = document.getElementById("header-progress");
    ph.style.display="flex";
    const pwrap = document.getElementById("header-progress-inner");
    if (S.step>=3) {
      if (pwrap) pwrap.style.display="flex";
      const p=calcProgress();
      document.getElementById("prog-fill").style.width=p+"%";
      document.getElementById("prog-label").textContent=p+"%";
    } else {
      if (pwrap) pwrap.style.display="none";
    }
    if (S.step === -1) {
      rElig(mainEl);
    } else if (S.step === 5) {
      rSubmission(mainEl);
    } else if (S.step === 3) {
      r3(mainEl);
    } else {
      [r0,r1,r2,r3][S.step](mainEl);
    }
  } catch(err) {
    console.error("render() error:", err);
    const mainEl = document.getElementById("main");
    if (mainEl) mainEl.innerHTML = `
      <div style="max-width:600px;margin:60px auto;padding:32px;background:#fff3cd;border:1px solid #ffc107;border-radius:12px;font-family:sans-serif">
        <h2 style="color:#856404;margin-bottom:12px">⚠️ Render Error</h2>
        <p style="color:#533f03;margin-bottom:16px">Something went wrong displaying this section. Your data has been saved.</p>
        <p style="font-family:monospace;font-size:12px;color:#856404;background:#fff8e1;padding:10px;border-radius:6px;word-break:break-all">${err.message || String(err)}</p>
        <div style="margin-top:20px;display:flex;gap:10px;flex-wrap:wrap">
          <button onclick="S.activeSection='mandatory';render()" style="padding:8px 16px;background:#503D5C;color:#fff;border:none;border-radius:6px;cursor:pointer">↩ Reset to Statements</button>
          <button onclick="goStep(2)" style="padding:8px 16px;background:#eee;border:none;border-radius:6px;cursor:pointer">← Back to Competencies</button>
        </div>
      </div>`;
  }
}

// ── Eligibility wizard helpers ────────────────────────────────────────────────

function eligResolveNode() {
  const e = S.elig;
  if (e.result !== null) return "DONE";

  // Walk deterministically through the tree
  if (e.hasDegree === null) return "START";

  if (e.hasDegree === true) {
    if (e.degreeLevel === null) return "DEGREE_LEVEL";
    if (e.degreeLevel === "bachelor_plus") {
      // Directly ask for experience — no accreditation question
      if (e.expYears === null) return "EXP_POST_DEGREE";
      if (e.expYears==="0-5")  return "RESULT_ACCR_SHORT";
      if (e.expYears==="5-10") return "RESULT_ACCR_MED";
      return "RESULT_ACCR_LONG";
    } else {
      // sub-degree → check professional membership (fromSubDegree=true)
      return eligProfMembershipBranch(true);
    }
  } else {
    // no degree → check professional membership (fromSubDegree=false → shows NO_DEGREE node)
    return eligProfMembershipBranch(false);
  }
}

function eligProfMembershipBranch(fromSubDegree) {
  const e = S.elig;
  // Step 1: Do they have a membership at all?
  if (e.hasProfMembership === null) {
    return fromSubDegree ? "HAVE_MEMBERSHIP" : "NO_DEGREE";
  }
  if (e.hasProfMembership === false) return eligNoQualBranch();

  // Step 2: Is it RICS-recognised?
  if (e.memberAccredited === null) return "IS_ACCREDITED";

  if (e.memberAccredited === true) {
    // RPQ route
    if (e.rpqBody === null) return "RPQ_BODY";
    if (e.rpqExpYears === null) return "RPQ_EXP";
    return "RESULT_RPQ";
  } else {
    // Non-accredited — need 5yrs experience for senior route
    if (e.exp5Years === null) return "EXP_PROF_MEM";
    if (e.exp5Years) return "RESULT_SENIOR";
    return eligNoQualBranch();
  }
}

function eligNoQualBranch() {
  const e = S.elig;
  if (e.expYears === null) return "EXP_NO_QUAL";
  if (e.expYears === "10+") return "RESULT_SENIOR_ROUTE";
  return "RESULT_NOT_YET";
}





// ── RPQ result computation ────────────────────────────────────────────────────
function computeRPQResult() {
  const e = S.elig;
  const body = RPQ_BODIES.find(b=>b.id===e.rpqBody);
  if (!body) return null;
  if (body.id === "OTHER" || body.expReq === null) {
    return { body, meetsExp:false, shortfall:null, canStart:false, outcome:null, expReq:null };
  }
  const expMap = {"0-5":2.5,"5-10":7.5,"10+":12};
  const exp = expMap[e.rpqExpYears] || 0;
  const meetsExp = body.expReq === 0 || exp >= body.expReq;
  const shortfall = body.expReq > 0 ? Math.max(0, body.expReq - exp) : 0;
  return {
    body, meetsExp, shortfall,
    canStart: meetsExp,
    outcome: body.outcome,
    expReq: body.expReq,
    expUnit: body.expUnit,
    note: body.note,
  };
}

function rElig(C) {
  // ── Dispatch to CICES eligibility if body is CICES ──────────────────────────
  if (S.body === "CICES") { rCicesElig(C); return; }

  const nodeId = eligResolveNode();
  const node   = ELIG_TREE[nodeId];
  const isResult = node && node.result !== undefined;

  // Build breadcrumb trail
  const breadcrumbs = buildEligBreadcrumbs();

  C.innerHTML = "";

  // Full-page layout: centred column, no sidebars
  const wrap = document.createElement("div");
  wrap.className = "elig-wrap";

  // ── Header card ────────────────────────────────────────────────────────────
  wrap.innerHTML = `
    <div class="elig-hero">
      <div class="elig-hero-inner">
        <div class="elig-logo-row">
          <span class="elig-badge-rics">RICS</span>
          <span class="elig-badge-sep">·</span>
          <span class="elig-badge-path">Geomatics Pathway</span>
        </div>
        <h1 class="elig-title">Eligibility Criteria Assessment</h1>
        <p class="elig-subtitle">Complete the assessment below to identify your MRICS route and understand when you are eligible to submit your application.</p>
      </div>
    </div>
  `;

  // ── Breadcrumb progress trail ───────────────────────────────────────────────
  if (breadcrumbs.length > 0) {
    const bc = document.createElement("div");
    bc.className = "elig-breadcrumbs";
    bc.innerHTML = breadcrumbs.map((b,i) => `
      <div class="elig-bc-item" onclick="eligGoBack(${i})">
        <span class="elig-bc-q">${b.qShort}</span>
        <span class="elig-bc-a">${b.aLabel}</span>
        <span class="elig-bc-edit">✎ edit</span>
      </div>
      ${i < breadcrumbs.length-1 ? '<span class="elig-bc-arrow">→</span>' : ''}
    `).join("");
    wrap.appendChild(bc);
  }

  C.appendChild(wrap);

  // ── Result card ─────────────────────────────────────────────────────────────
  if (isResult) {
    renderEligResult(nodeId, wrap);
    return;
  }

  // ── Question card ───────────────────────────────────────────────────────────
  if (!node) {
    wrap.innerHTML += `<div class="elig-card"><p>Something went wrong. <button class="btn btn-ghost" onclick="resetElig()">Start over</button></p></div>`;
    return;
  }

  const card = document.createElement("div");
  card.className = "elig-card";

  // Progress indicator
  const totalSteps = 4; // approximate
  const doneSteps  = breadcrumbs.length;
  const progPct    = Math.round((doneSteps / (totalSteps + doneSteps)) * 100);

  card.innerHTML = `
    <div class="elig-step-label">Question ${doneSteps + 1}</div>
    <div class="elig-progress-bar"><div class="elig-progress-fill" style="width:${progPct}%"></div></div>
    <h2 class="elig-question">${node.question}</h2>
    ${node.hint ? `<p class="elig-hint">💡 ${node.hint}</p>` : ''}
    <div class="elig-options ${node.type==='select'?'elig-select-wrap':''}" id="elig-options">
    </div>
    ${doneSteps > 0 ? `<button class="elig-back-btn" onclick="eligGoBackOne()">← Back</button>` : ''}
  `;

  wrap.appendChild(card);

  // Render options
  const optContainer = card.querySelector("#elig-options");

  if (node.type === "select") {
    // Group bodies by country
    const countries = [...new Set(RPQ_BODIES.map(b=>b.country))];
    const sel = document.createElement("div");
    sel.className = "elig-select-list";

    countries.forEach(country => {
      const bodies = RPQ_BODIES.filter(b=>b.country===country);
      const grpLabel = document.createElement("div");
      grpLabel.className = "elig-select-group-label";
      grpLabel.textContent = country;
      sel.appendChild(grpLabel);
      bodies.forEach(body => {
        const div = document.createElement("div");
        div.className = `elig-select-item${S.elig.rpqBody===body.id?' selected':''}`;
        const expText = body.expReq===null ? "" : body.expReq===0 ? "No exp. required" : `${body.expReq}yr exp. required`;
        div.innerHTML = `
          <div class="elig-select-main">${body.name}</div>
          ${expText ? `<div class="elig-select-exp">${expText}</div>` : ''}
        `;
        div.onclick = () => {
          setEligAnswer("RPQ_BODY", body.id);
        };
        sel.appendChild(div);
      });
    });
    optContainer.appendChild(sel);
  } else {
    // Regular choice buttons
    node.options.forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "elig-opt-btn";
      // Determine if this option was previously selected
      const currentVal = getEligCurrentAnswer(nodeId);
      if (currentVal !== null && currentVal === opt.val) btn.classList.add("selected");
      btn.innerHTML = `<span class="elig-opt-label">${opt.label}</span>`;
      btn.onclick = () => {
        setEligAnswer(nodeId, opt.val);
      };
      optContainer.appendChild(btn);
    });
  }
}

    (doneSteps > 0 ? "<button class=\"elig-back-btn\" onclick=\"cicesEligGoBack(" + (doneSteps-1) + ")\">← Back</button>" : "");

  wrap.appendChild(card);

  const optContainer = card.querySelector("#elig-options-cices");
  node.options.forEach(function(opt) {
    const btn = document.createElement("button");
    btn.className = "elig-opt-btn";
    const currentVal = getCicesEligCurrentAnswer(nodeId);
    if (currentVal !== null && currentVal === opt.val) btn.classList.add("selected");
    btn.innerHTML = "<span class=\"elig-opt-label\">" + opt.label + "</span>";
    btn.onclick = function() { setCicesEligAnswer(nodeId, opt.val); };
    optContainer.appendChild(btn);
  });
}


function rElig(C) {
  // ── Dispatch to CICES eligibility if body is CICES ──────────────────────────

  const nodeId = eligResolveNode();
  const node   = ELIG_TREE[nodeId];
  const isResult = node && node.result !== undefined;

  // Build breadcrumb trail
  const breadcrumbs = buildEligBreadcrumbs();

  C.innerHTML = "";

  // Full-page layout: centred column, no sidebars
  const wrap = document.createElement("div");
  wrap.className = "elig-wrap";

  // ── Header card ────────────────────────────────────────────────────────────
  wrap.innerHTML = `
    <div class="elig-hero">
      <div class="elig-hero-inner">
        <div class="elig-logo-row">
          <span class="elig-badge-rics">RICS</span>
          <span class="elig-badge-sep">·</span>
          <span class="elig-badge-path">Geomatics Pathway</span>
        </div>
        <h1 class="elig-title">Eligibility Criteria Assessment</h1>
        <p class="elig-subtitle">Complete the assessment below to identify your MRICS route and understand when you are eligible to submit your application.</p>
      </div>
    </div>
  `;

  // ── Breadcrumb progress trail ───────────────────────────────────────────────
  if (breadcrumbs.length > 0) {
    const bc = document.createElement("div");
    bc.className = "elig-breadcrumbs";
    bc.innerHTML = breadcrumbs.map((b,i) => `
      <div class="elig-bc-item" onclick="eligGoBack(${i})">
        <span class="elig-bc-q">${b.qShort}</span>
        <span class="elig-bc-a">${b.aLabel}</span>
        <span class="elig-bc-edit">✎ edit</span>
      </div>
      ${i < breadcrumbs.length-1 ? '<span class="elig-bc-arrow">→</span>' : ''}
    `).join("");
    wrap.appendChild(bc);
  }

  C.appendChild(wrap);

  // ── Result card ─────────────────────────────────────────────────────────────
  if (isResult) {
    renderEligResult(nodeId, wrap);
    return;
  }

  // ── Question card ───────────────────────────────────────────────────────────
  if (!node) {
    wrap.innerHTML += `<div class="elig-card"><p>Something went wrong. <button class="btn btn-ghost" onclick="resetElig()">Start over</button></p></div>`;
    return;
  }

  const card = document.createElement("div");
  card.className = "elig-card";

  // Progress indicator
  const totalSteps = 4; // approximate
  const doneSteps  = breadcrumbs.length;
  const progPct    = Math.round((doneSteps / (totalSteps + doneSteps)) * 100);

  card.innerHTML = `
    <div class="elig-step-label">Question ${doneSteps + 1}</div>
    <div class="elig-progress-bar"><div class="elig-progress-fill" style="width:${progPct}%"></div></div>
    <h2 class="elig-question">${node.question}</h2>
    ${node.hint ? `<p class="elig-hint">💡 ${node.hint}</p>` : ''}
    <div class="elig-options ${node.type==='select'?'elig-select-wrap':''}" id="elig-options">
    </div>
    ${doneSteps > 0 ? `<button class="elig-back-btn" onclick="eligGoBackOne()">← Back</button>` : ''}
  `;

  wrap.appendChild(card);

  // Render options
  const optContainer = card.querySelector("#elig-options");

  if (node.type === "select") {
    // Group bodies by country
    const countries = [...new Set(RPQ_BODIES.map(b=>b.country))];
    const sel = document.createElement("div");
    sel.className = "elig-select-list";

    countries.forEach(country => {
      const bodies = RPQ_BODIES.filter(b=>b.country===country);
      const grpLabel = document.createElement("div");
      grpLabel.className = "elig-select-group-label";
      grpLabel.textContent = country;
      sel.appendChild(grpLabel);
      bodies.forEach(body => {
        const div = document.createElement("div");
        div.className = `elig-select-item${S.elig.rpqBody===body.id?' selected':''}`;
        const expText = body.expReq===null ? "" : body.expReq===0 ? "No exp. required" : `${body.expReq}yr exp. required`;
        div.innerHTML = `
          <div class="elig-select-main">${body.name}</div>
          ${expText ? `<div class="elig-select-exp">${expText}</div>` : ''}
        `;
        div.onclick = () => {
          setEligAnswer("RPQ_BODY", body.id);
        };
        sel.appendChild(div);
      });
    });
    optContainer.appendChild(sel);
  } else {
    // Regular choice buttons
    node.options.forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "elig-opt-btn";
      // Determine if this option was previously selected
      const currentVal = getEligCurrentAnswer(nodeId);
      if (currentVal !== null && currentVal === opt.val) btn.classList.add("selected");
      btn.innerHTML = `<span class="elig-opt-label">${opt.label}</span>`;
      btn.onclick = () => {
        setEligAnswer(nodeId, opt.val);
      };
      optContainer.appendChild(btn);
    });
  }
}

function getEligCurrentAnswer(nodeId) {
  const e = S.elig;
  const map = {
    "START":                 e.hasDegree,
    "DEGREE_LEVEL":          e.degreeLevel,
    // "DEGREE_ACCREDITED": removed,
    "EXP_POST_DEGREE":       e.expYears,
    "EXP_POST_DEGREE_NONACCR": e.expYears,
    "NO_DEGREE":             e.hasProfMembership,
    "HAVE_MEMBERSHIP":       e.hasProfMembership,
    "IS_ACCREDITED":         e.memberAccredited,
    "RPQ_BODY":              e.rpqBody,
    "RPQ_EXP":               e.rpqExpYears,
    "EXP_PROF_MEM":          e.exp5Years,
    "EXP_NO_QUAL":           e.expYears,
  };
  return (map[nodeId] !== undefined) ? map[nodeId] : null;
}

function setEligAnswer(nodeId, val) {
  const e = S.elig;
  switch(nodeId) {
    case "START":
      // Reset all downstream when changing degree status
      e.hasDegree=val; e.degreeLevel=null; e.expYears=null;
      e.hasProfMembership=null; e.memberAccredited=null; e.rpqBody=null; e.rpqExpYears=null; e.exp5Years=null;
      break;
    case "DEGREE_LEVEL":
      e.degreeLevel=val; e.expYears=null;
      e.hasProfMembership=null; e.memberAccredited=null; e.rpqBody=null; e.rpqExpYears=null; e.exp5Years=null;
      break;
    // DEGREE_ACCREDITED case removed
    case "EXP_POST_DEGREE":
    case "EXP_POST_DEGREE_NONACCR":
      e.expYears=val;
      break;
    case "NO_DEGREE":
    case "HAVE_MEMBERSHIP":
      // "Do you have a professional membership?"
      e.hasProfMembership=val;
      e.memberAccredited=null; e.rpqBody=null; e.rpqExpYears=null; e.exp5Years=null;
      break;
    case "IS_ACCREDITED":
      // "Is your membership RICS-recognised?"
      e.memberAccredited=val;
      e.rpqBody=null; e.rpqExpYears=null; e.exp5Years=null;
      break;
    case "RPQ_BODY":
      e.rpqBody=val; e.rpqExpYears=null;
      break;
    case "RPQ_EXP":
      e.rpqExpYears=val;
      break;
    case "EXP_PROF_MEM":
      e.exp5Years=val;
      break;
    case "EXP_NO_QUAL":
      e.expYears=val;
      break;
  }
  saveState();
  render();
}

function buildEligBreadcrumbs() {
  const e = S.elig;
  const trail = [];
  const add = (qShort, aLabel, resetFn) => trail.push({qShort, aLabel, resetFn});

  // 1. Degree?
  if (e.hasDegree !== null) {
    add("Degree?", e.hasDegree ? "Yes" : "No",
      ()=>{ Object.assign(e,{hasDegree:null,degreeLevel:null,degreeAccredited:null,expYears:null,
              hasProfMembership:null,memberAccredited:null,rpqBody:null,rpqExpYears:null,exp5Years:null}); });
  }
  // 2. Degree level?
  if (e.hasDegree===true && e.degreeLevel !== null) {
    add("Level?", e.degreeLevel==="bachelor_plus"?"Bachelor's+":"Sub-degree",
      ()=>{ Object.assign(e,{degreeLevel:null,degreeAccredited:null,expYears:null,
              hasProfMembership:null,memberAccredited:null,rpqBody:null,rpqExpYears:null,exp5Years:null}); });
  }
  // 3. Post-degree experience (for bachelor+ paths) — accreditation no longer asked
  if (e.degreeLevel==="bachelor_plus" && e.expYears !== null) {
    add("Exp. yrs?", e.expYears, ()=>{ e.expYears=null; });
  }
  // 5. Professional membership? (for sub-degree or no-degree paths)
  if ((e.hasDegree===false || e.degreeLevel==="below_bachelor") && e.hasProfMembership !== null) {
    add("Membership?", e.hasProfMembership?"Yes":"No",
      ()=>{ Object.assign(e,{hasProfMembership:null,memberAccredited:null,rpqBody:null,rpqExpYears:null,exp5Years:null,expYears:null}); });
  }
  // 6. RICS recognised?
  if (e.hasProfMembership===true && e.memberAccredited !== null) {
    add("RPQ route?", e.memberAccredited?"Yes":"No",
      ()=>{ Object.assign(e,{memberAccredited:null,rpqBody:null,rpqExpYears:null,exp5Years:null}); });
  }
  // 7. RPQ body
  if (e.rpqBody !== null) {
    const body = RPQ_BODIES.find(b=>b.id===e.rpqBody);
    add("Body?", body ? body.name.split('–')[0].trim() : e.rpqBody,
      ()=>{ e.rpqBody=null; e.rpqExpYears=null; });
  }
  // 8. RPQ experience
  if (e.rpqExpYears !== null) {
    add("RPQ exp?", e.rpqExpYears+" yrs", ()=>{ e.rpqExpYears=null; });
  }
  // 9. 5 years experience (senior route check)
  if (e.exp5Years !== null) {
    add("5yrs exp?", e.exp5Years?"Yes":"No", ()=>{ e.exp5Years=null; });
  }
  // 10. No-qual experience
  if (e.hasProfMembership===false && e.expYears !== null) {
    add("Exp. yrs?", e.expYears, ()=>{ e.expYears=null; });
  }
  return trail;
}

function eligGoBackOne() {
  const crumbs = buildEligBreadcrumbs();
  if (crumbs.length > 0) {
    crumbs[crumbs.length-1].resetFn();
    saveState();
    render();
  }
}

function eligGoBack(idx) {
  const crumbs = buildEligBreadcrumbs();
  // Reset from idx onwards
  for (let i = crumbs.length-1; i >= idx; i--) {
    crumbs[i].resetFn();
  }
  saveState();
  render();
}

function resetElig() {
  S.elig = {hasDegree:null,degreeLevel:null,degreeAccredited:null,expYears:null,
            hasProfMembership:null,memberAccredited:null,exp5Years:null,

            cHasDegree:null,cExpWithDeg:null,cExpNoDeg:null,cExpPossibly:null};
  S.step = -1;
  saveState();
  render();
}

  // Core

  addPanel(compCol,`

}

function addPanel(C,html,cls="",collapsible=false) {
  const d=document.createElement("div");
  d.className="panel "+cls;
  if (collapsible) {
    d.className += " panel-collapsible";
    const tmp = document.createElement("div");
    tmp.innerHTML = html;
    const hdr = tmp.querySelector(".section-header");
    if (hdr) {
      // SVG chevron button
      const btn = document.createElement("button");
      btn.className = "panel-collapse-btn";
      btn.title = "Collapse / expand";
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>`;
      // Toggle on button click
      btn.addEventListener("click", function(e) {
        e.stopPropagation();
        d.classList.toggle("collapsed");
      });
      hdr.appendChild(btn);
      // Make entire header row toggle too
      hdr.addEventListener("click", function() {
        d.classList.toggle("collapsed");
      });
      d.appendChild(hdr);
      // Wrap remaining nodes in panel-body
      const body = document.createElement("div");
      body.className = "panel-body";
      body.style.maxHeight = "2000px";
      body.style.opacity = "1";
      while (tmp.firstChild) {
        body.appendChild(tmp.firstChild);
      }
      d.appendChild(body);
    } else {
      d.innerHTML = html;
    }
  } else {
    d.innerHTML = html;
  }
  C.appendChild(d);
}

function buildCoreRows() {
  const otherB = usedBases("core");
  const sf3On  = S.sel.sf3Level===3;

  // MSR row — always present, toggleable level
  let h=`<div class="comp-row ${sf3On?'selected':'locked'}" onclick="toggleSF3()" style="cursor:pointer">
    <div class="chk-lock-r">${svgCk('#fff')}</div>
    <span class="comp-id" style="color:${sf3On?'var(--accent)':'#4caf7d'}">MSR</span>
    <span class="comp-name" style="color:${sf3On?'var(--text)':'#4caf7d'}">Measurement</span>
    <div class="sf3-toggle" onclick="event.stopPropagation()">
      <span class="sf3-lbl">Level:</span>
      <button class="sf3-btn ${!sf3On?'on':'off'}" onclick="setSF3(1)">L1</button>
      <button class="sf3-btn ${sf3On?'on':'off'}"  onclick="setSF3(3)">L3 (counts as core)</button>
    </div>
  </div>`;

  // Remaining — exclude MSR and the specialism comp
  getCoreList().filter(c=>c.id!=="MSR" && c.id!==S.sel.spec).forEach(comp=>{
    const on=S.sel.core.includes(comp.id);
    const b=gb(comp);
    const ue=!on && otherB.has(b);
    const al=!on && (3-coreCount())<=0;
    const dis=ue||al;
    h+=`<div class="comp-row${on?' selected':''}${dis?' disabled':''}" onclick="togCore('${comp.id}')" onmouseenter="setGlossaryComp('${comp.id}')">
      <div class="chk${on?' on':''}">${on?svgCk('var(--bg)'):''}</div>
      <span class="comp-id">${(S.compAliases&&S.compAliases[comp.id])||comp.id}</span>
      <span class="comp-name">${comp.name}</span>
      ${ue&&!on?'<span class="comp-conflict">used elsewhere</span>':""}
      ${al&&!on?'<span class="comp-limit">limit reached</span>':""}
    </div>`;
  });
  return h;
}

function buildOptRows() {
  const cB = new Set([...S.sel.core.map(id=>boOf(id,getCoreList())), "MSR"]);
  const sB = S.sel.spec ? boOf(S.sel.spec,getCoreList()) : null;
  const tB = S.sel.tech ? boOf(S.sel.tech,getTechList()) : null;
  let h="";
  getOptList().forEach(comp=>{
    const on=S.sel.opt.includes(comp.id), b=gb(comp);
    const ue=!on&&(cB.has(b)||sB===b||tB===b);
    const al=!on&&S.sel.opt.length>=2;
    const dis=(ue||al)&&!on;
    h+=`<div class="comp-row${on?' selected':''}${dis?' disabled':''}" onclick="togOpt('${comp.id}')" onmouseenter="setGlossaryComp('${comp.id}')">
      <div class="chk${on?' on':''}">${on?svgCk('var(--bg)'):''}</div>
      <span class="comp-id">${(S.compAliases&&S.compAliases[comp.id])||comp.id}</span>
      <span class="comp-name">${comp.name}</span>
      ${ue&&!on?'<span class="comp-conflict">used elsewhere</span>':""}
    </div>`;
  });
  return h;
}

function buildTechRows() {
  const cB = new Set([...S.sel.core.map(id=>boOf(id,getCoreList())), "MSR"]);
  const oB = new Set(S.sel.opt.map(id=>boOf(id,getOptList())));
  const sB = S.sel.spec ? boOf(S.sel.spec,getCoreList()) : null;
  let h="";
  getTechList().forEach(comp=>{
    const on=S.sel.tech===comp.id, b=gb(comp);
    const ue=!on&&(cB.has(b)||oB.has(b)||sB===b);
    const al=!on&&S.sel.tech!==null;
    const dis=(ue||al)&&!on;
    h+=`<div class="comp-row${on?' selected':''}${dis?' disabled':''}" onclick="togTech('${comp.id}')" onmouseenter="setGlossaryComp('${comp.id}')">
      <div class="chk radio${on?' on':''}">${on?svgRad():''}</div>
      <span class="comp-id">${(S.compAliases&&S.compAliases[comp.id])||comp.id.replace(/t$/,'')}</span>
      <span class="comp-name">${comp.name}</span>
      ${ue&&!on?'<span class="comp-conflict">used elsewhere</span>':""}
    </div>`;
  });
  return h;
}

function svgCk(fill) { return `<svg width="10" height="10" viewBox="0 0 10 10"><polyline points="1,5 4,8 9,2" stroke="${fill}" stroke-width="1.8" fill="none"/></svg>`; }
function svgRad()    { return `<svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="2.5" fill="var(--bg)"/></svg>`; }

// ────────────────────────── interaction handlers ─────────────────────────────

function setSF3(l)    { S.sel.sf3Level=l; saveState(); render(); }
function toggleSF3()  { S.sel.sf3Level = S.sel.sf3Level===3 ? 1 : 3; render(); }

function togCore(id) {
  if (id==="MSR"||id===S.sel.spec) return;
  const on=S.sel.core.includes(id);
  if (on) { S.sel.core=S.sel.core.filter(x=>x!==id); render(); return; }
  const b=boOf(id,getCoreList());
  if (usedBases("core").has(b)) return;
  if ((3-coreCount())<=0) return;
  S.sel.core.push(id); saveState(); render();
}

function togOpt(id) {
  const on=S.sel.opt.includes(id);
  if (on) { S.sel.opt=S.sel.opt.filter(x=>x!==id); render(); return; }
  const b=gb(getOptList().find(x=>x.id===id));
  const cB=new Set([...S.sel.core.map(x=>boOf(x,getCoreList())),"MSR"]);
  const sB=S.sel.spec?boOf(S.sel.spec,getCoreList()):null;
  const tB=S.sel.tech?boOf(S.sel.tech,getTechList()):null;
  if (cB.has(b)||sB===b||tB===b||S.sel.opt.length>=2) return;
  S.sel.opt.push(id); saveState(); render();
}

function togTech(id) {
  if (S.sel.tech===id) { S.sel.tech=null; render(); return; }
  const b=gb(getTechList().find(x=>x.id===id));
  const cB=new Set([...S.sel.core.map(x=>boOf(x,getCoreList())),"MSR"]);
  const oB=new Set(S.sel.opt.map(x=>boOf(x,getOptList())));
  const sB=S.sel.spec?boOf(S.sel.spec,getCoreList()):null;
  if (cB.has(b)||oB.has(b)||sB===b) return;
  S.sel.tech=id; saveState(); render();
}

function tryAdvance() { if (validate()) { S.activeComp=null; goStep(3); } else render(); }

// Categorise comps into two sections
function mandatoryComps() { return buildAllComps().filter(c=>c.cat==="Mandatory"); }
function technicalComps()  { return buildAllComps().filter(c=>c.cat!=="Mandatory"); }

// Word count totals for a group
function sectionWordCount(comps) {
  let total=0, words=0;
  comps.forEach(comp=>{
    for(let l=1;l<=comp.req;l++){
      total += getWordTarget(comp,l);
      words += cw(S.statements[`${comp.id}_L${l}`]);
    }
  });
  return {words, total};
}

// Completion % for a single comp (word-based)
function compWordPct(comp) {
  let w=0,t=0;
  for(let l=1;l<=comp.req;l++){
    t+=getWordTarget(comp,l);
    w+=cw(S.statements[`${comp.id}_L${l}`]);
  }
  return t ? Math.min(Math.round((w/t)*100),100) : 0;
}

// Is comp manually marked complete?
function isCompleted(id) { return !!S.completed[id]; }

// Max word caps per section
const SECTION_MAX = { mand: 1500, tech: 4000 };

function sectionBar(comps, idPrefix) {
  const {words} = sectionWordCount(comps);
  const max = SECTION_MAX[idPrefix] || 1500;
  const pct = Math.min(Math.round((words/max)*100),100);
  const over = words > max;
  const hexCol = over?"#c0392b":pct>=85?"#2e7d52":pct>=50?"#6F597A":"#5a8aa4";
  const numCompleted = comps.filter(c=>isCompleted(c.id)).length;
  const label = idPrefix==="mand"
    ? "Total word count — Mandatory (max 1,500)"
    : "Total word count — Technical (max 4,000)";
  return `<div class="section-wc-bar" id="swcbar_${idPrefix}">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:4px">
      <div>
        <span style="font-size:12px;color:var(--muted);font-weight:500">${label}</span>
        <span style="font-size:11px;color:var(--faint);margin-left:8px">${numCompleted}/${comps.length} marked complete</span>
      </div>
      <span style="font-family:'DM Mono',monospace;font-size:12px;font-weight:700;color:${hexCol}" id="swc_${idPrefix}">${words.toLocaleString()} / ${max.toLocaleString()} words${over?' ⚠ over':' ('+pct+'%)'}</span>
    </div>
    <div style="background:var(--border);border-radius:5px;height:8px;overflow:hidden">
      <div id="swcfill_${idPrefix}" style="height:100%;border-radius:5px;background:${hexCol};width:${pct}%;transition:width .4s,background .4s"></div>
    </div>
  </div>`;
}

function r3(C) {

  if (isRPQRoute() && (S.activeSection === "mandatory" || S.activeSection === "technical" || S.activeSection === "casestudy")) {

    rCPD(C);

  // CICES: competencies tab replaces statements

  const secHtml=`<div class="section-panel">

function updStmt(key, val) {
  S.statements[key]=val;
  const l=parseInt(key.split("_").pop().replace("L",""));
  const _updComp=buildAllComps().find(c=>key.startsWith(c.id+"_"));
  const tgt=_updComp?getWordTarget(_updComp,l):WORD_TARGETS[l];
  const n=cw(val);
  const over=n>tgt,good=!over&&n>=tgt*.85;
  const col=over?"#c0392b":good?"#2e7d52":n>=tgt*.5?"#b5651d":"#96aab8";
  const pct=Math.min((n/tgt)*100,100);
  const we=document.getElementById(`wc_${key}`), be=document.getElementById(`wbf_${key}`);
  if(we){we.textContent=`${n}${over?' ⚠ over':good?' ✓':'/'+tgt}`;we.style.color=col;}
  if(be){be.style.width=pct+"%";be.style.background=col;}
  // update section bar
  const secId = S.activeSection==="mandatory"?"mand":"tech";
  const visComps = S.activeSection==="mandatory"?mandatoryComps():technicalComps();
  const {words:sw}=sectionWordCount(visComps);
  const smax=SECTION_MAX[secId]||1500;
  const spct=Math.min(Math.round((sw/smax)*100),100);
  const sover=sw>smax;
  const scol=sover?"#c0392b":spct>=85?"#2e7d52":spct>=50?"#6F597A":"#5a8aa4";
  const swcEl=document.getElementById(`swc_${secId}`),swfEl=document.getElementById(`swcfill_${secId}`);
  if(swcEl){swcEl.textContent=`${sw.toLocaleString()} / ${smax.toLocaleString()} words${sover?' ⚠ over':' ('+spct+'%)'}`;swcEl.style.color=scol;}
  if(swfEl){swfEl.style.width=spct+"%";swfEl.style.background=scol;}
  // update global progress
  saveState();
  if(S.step>=3){
    const p=calcProgress();
    const pf=document.getElementById("prog-fill"),pl=document.getElementById("prog-label");
    if(pf) pf.style.width=p+"%"; if(pl) pl.textContent=p+"%";
  }
  // update sidebar mini-bar for this comp
  const allC=buildAllComps();
  const comp=allC.find(c=>key.startsWith(c.id+"_"));
  if(comp){
    const cpct=compWordPct(comp);
    const cpctCol=isCompleted(comp.id)?"#6F597A":cpct>=85?"#2e7d52":cpct>=50?"#b5651d":"#96aab8";
    document.querySelectorAll(".sidebar-item").forEach(el=>{
      const nameEl=el.querySelector("div > div:first-child");
      if(nameEl && nameEl.textContent.trim()===comp.name){
        const miniBar=el.querySelector("div[style*='height:3px'] > div");
        const pctSpan=el.querySelector("span[style*='9px']");
        if(miniBar){miniBar.style.width=cpct+"%";miniBar.style.background=cpctCol;}
        if(pctSpan)pctSpan.textContent=cpct+"%";
      }
    });
  }
}

function insertFigRef(figLabel) {
  // Insert [Fig. X] reference into the last-focused ER chapter textarea
  let ta = _erLastFocusedTaId ? document.getElementById(_erLastFocusedTaId) : null;
  if (!ta) {
    const all = document.querySelectorAll("[id^='er-ch-text-']");
    ta = all.length ? all[all.length - 1] : null;
  }
  if (!ta) return;
  const ref = "[" + figLabel + "]";
  const start = ta.selectionStart;
  const end   = ta.selectionEnd;
  const before = ta.value.substring(0, start);
  const after  = ta.value.substring(end);
  const spaceBefore = (before.length > 0 && before[before.length-1] !== ' ' && before[before.length-1] !== '\n') ? ' ' : '';
  ta.value = before + spaceBefore + ref + after;
  const newPos = start + spaceBefore.length + ref.length;
  ta.selectionStart = ta.selectionEnd = newPos;
  ta.focus();
  const chId = ta.id.replace("er-ch-text-", "");
  erUpdateChapterText(chId, ta.value);
}

function handleERAppendixUpload(input) {
  const files = Array.from(input.files);
  let loaded = 0;
  if (!S.erAppendices) S.erAppendices = [];
  const startIdx = S.erAppendices.length; // index of first new image
  files.forEach((file, fi) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const idx   = S.erAppendices.length + 1;
      const id    = "erfig_" + Date.now() + "_" + Math.random().toString(36).slice(2,6);
      const label = "Fig. " + idx;
      S.erAppendices.push({ id, name: file.name, caption: "", dataUrl: e.target.result, label });
      loaded++;
      if (loaded === files.length) {
        // Auto-insert [Fig. X] tags for each newly added image into last-focused chapter
        const newFigs = S.erAppendices.slice(startIdx);
        let ta = _erLastFocusedTaId ? document.getElementById(_erLastFocusedTaId) : null;
        if (!ta) {
          const all = document.querySelectorAll("[id^='er-ch-text-']");
          ta = all.length ? all[all.length - 1] : null;
        }
        if (ta) {
          const refs = newFigs.map(f => "[" + f.label + "]").join(" ");
          const spacer = (ta.value.length > 0 && ta.value[ta.value.length-1] !== '\n') ? '\n' : '';
          ta.value = ta.value + spacer + refs;
          const chId = ta.id.replace("er-ch-text-", "");

        saveState();
        const grid = document.getElementById("er-appendix-grid");
        if (grid) grid.innerHTML = renderERAppendixGrid();

function replaceERAppendix(id) {
  const input = document.createElement("input");

function buildSummaryGrid(csn) {
  const dl = getDesigLabel();
  const si = [
    {l:"Body",           v: S.body || "—"},
    {l:"Designation",    v: dl},
    {l:"Mandatory",      v: `${MANDATORY.length} competencies (auto)`},
    {l:"Core (Level 3)", v: `${S.sel.core.length} selected + Measurement (L${S.sel.sf3Level})`},
    {l:"Specialism",     v: S.sel.spec ? `${S.sel.spec} (auto)` : "—"},
    {l:"Optional (L2)",  v: `${S.sel.opt.length}/2`},
    {l:"Technical (L2)", v: S.sel.tech || "—"},
    {l:"Case Study",     v: `${csn} words`},
    {l:"Appendix images",v: `${S.appendices.length} image(s)`},
    {l:"Overall Progress",v: calcProgress() + "%"},
  ];
  return si.map(i=>`<div class="summary-cell"><div class="summary-cell-label">${i.l}</div><div class="summary-cell-val">${i.v}</div></div>`).join("");
}

function updateAppendixTitle(id, val) {
  const img = S.appendices.find(a => a.id === id);
  if (img) { img.title = val; saveState(); }
}

function renderAppendixGrid() {
  if (!S.appendices || !S.appendices.length) return "";
  return S.appendices.map((img, i) => `
    <div class="cs-appendix-item" id="appx-${img.id}">
      <img class="cs-appendix-thumb" src="${img.dataUrl}" alt="${img.label}"
           onclick="openLightbox('${img.id}')" title="Click to view full size">
      <div class="cs-appendix-label">${img.label}</div>
      <input
        class="cs-appendix-title-input"
        type="text"
        value="${esc(img.title||'')}"
        placeholder="Add a title…"
        oninput="updateAppendixTitle('${img.id}', this.value)"
        onclick="event.stopPropagation()"
        title="Figure title (printed in document)">
      <div class="cs-appendix-name" title="${img.name}">${img.name}</div>
      <div class="cs-appendix-actions">
        <button class="cs-appx-btn cs-appx-open"   onclick="openLightbox('${img.id}')"  title="View full size">⛶</button>
        <button class="cs-appx-btn cs-appx-replace" onclick="replaceAppendix('${img.id}')" title="Replace image">↺</button>
        <button class="cs-appx-btn cs-appx-del"     onclick="removeAppendix('${img.id}')"  title="Remove">✕</button>
      </div>

function handleAppendixUpload(input) {
  const files = Array.from(input.files);
  let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const idx  = S.appendices.length + 1;
      const id   = "fig_" + Date.now() + "_" + Math.random().toString(36).slice(2,6);
      const label = "Fig. " + idx;
      S.appendices.push({ id, name: file.name, dataUrl: e.target.result, label, title: "" });
      loaded++;
      if (loaded === files.length) {
        saveState();
        // Re-render grid and re-init hovers
        const grid = document.getElementById("cs-appendix-grid");
        if (grid) grid.innerHTML = renderAppendixGrid();
        const sumGrid = document.getElementById("cs-summary-grid");
        if (sumGrid) sumGrid.innerHTML = buildSummaryGrid(cw(S.caseStudy));
        setTimeout(initFigHovers, 0);
        // Auto-insert [Fig. N] into last-focused chapter textarea.
        // File picker steals focus before onload fires, so we use the
        // window._lastFocusedCsTA ref and its saved cursor position.
        const activeTA = window._lastFocusedCsTA ||
                         document.querySelector(".cs-chapter-ta");
        if (activeTA) {
          const ref   = " [" + label + "]";
          const saved = window._lastFocusedCsTAPos;
          const start = (saved != null) ? saved.start : activeTA.value.length;
          const end   = (saved != null) ? saved.end   : activeTA.value.length;
          const val   = activeTA.value;
          activeTA.value = val.slice(0, start) + ref + val.slice(end);
          const newPos = start + ref.length;
          activeTA.focus();
          activeTA.setSelectionRange(newPos, newPos);
          window._lastFocusedCsTAPos = { start: newPos, end: newPos };
          const chId = activeTA.dataset.chapterId;
          if (chId) csUpdateChapterText(chId, activeTA.value);
        }
      }
    };
    reader.readAsDataURL(file);
  });
  input.value = ""; // reset so same file can be re-added
}

function openLightbox(id) {
  const img = S.appendices.find(a => a.id === id);
  if (!img) return;

  // Build lightbox overlay
  const lb = document.createElement("div");
  lb.id = "cs-lightbox";
  lb.style.cssText = `
    position:fixed;inset:0;z-index:10000;
    background:rgba(0,0,0,.88);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    animation:fadeIn .18s ease;cursor:zoom-out;
  `;

  lb.innerHTML = `
    <div style="position:relative;max-width:92vw;max-height:88vh;display:flex;flex-direction:column;align-items:center;gap:12px" onclick="event.stopPropagation()">
      <img src="${img.dataUrl}" alt="${img.label}"
           style="max-width:90vw;max-height:80vh;object-fit:contain;border-radius:8px;box-shadow:0 8px 48px rgba(0,0,0,.6);cursor:default">
      <div style="display:flex;align-items:center;gap:16px">
        <span style="font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:rgba(255,255,255,.9)">${img.label}${img.title ? ' — ' + esc(img.title) : ''}</span>
        <span style="font-size:12px;color:rgba(255,255,255,.55)">${img.name}</span>
      </div>
      <button onclick="document.getElementById('cs-lightbox').remove()"
        style="position:absolute;top:-14px;right:-14px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)">✕</button>
    </div>
  `;

  lb.onclick = () => lb.remove();

  // Close on Escape
  const onKey = (e) => { if (e.key === "Escape") { lb.remove(); document.removeEventListener("keydown", onKey); } };
  document.addEventListener("keydown", onKey);

  document.body.appendChild(lb);
}

function replaceAppendix(id) {
  // Create a hidden file input, trigger it, then swap the image data
  const input = document.createElement("input");
  input.type  = "file";
  input.accept = "image/*";
  input.style.display = "none";
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const appx = S.appendices.find(a => a.id === id);
      if (!appx) return;
      appx.dataUrl = ev.target.result;
      appx.name    = file.name;
      saveState();
      // Refresh grid and overlay
      const grid = document.getElementById("cs-appendix-grid");
      if (grid) grid.innerHTML = renderAppendixGrid();
      setTimeout(initFigHovers, 0);
    };
    reader.readAsDataURL(file);
    input.remove();
  };
  document.body.appendChild(input);
  input.click();
}


function removeAppendix(id) {
  S.appendices = S.appendices.filter(a => a.id !== id);
  // Re-number labels
  S.appendices.forEach((a, i) => { a.label = "Fig. " + (i + 1); });
  saveState();
  const grid = document.getElementById("cs-appendix-grid");
  if (grid) grid.innerHTML = renderAppendixGrid();
  const sumGrid = document.getElementById("cs-summary-grid");
  if (sumGrid) sumGrid.innerHTML = buildSummaryGrid(cw(S.caseStudy));
  initFigHovers();
}

// ── Figure hover preview ──────────────────────────────────────────────────────
function initFigHovers() {
  const ta = document.getElementById("casestudy-ta");
  if (!ta) return;

  // Create shared tooltip element if not exists
  let tooltip = document.getElementById("fig-preview-tooltip");
  if (!tooltip) {
    tooltip = document.createElement("div");
    tooltip.id = "fig-preview-tooltip";
    tooltip.className = "fig-preview-tooltip";
    tooltip.innerHTML = '<img id="fig-preview-img" src="" alt=""><div class="fig-preview-label" id="fig-preview-lbl"></div>';
    document.body.appendChild(tooltip);
  }

  // We can't hover within a <textarea> — so render a rich overlay div
  // that mirrors the textarea content with clickable/hoverable [Fig. N] spans
  buildFigOverlay();
}

function buildFigOverlay() {
  // Remove existing overlay
  const old = document.getElementById("cs-fig-overlay-wrap");
  if (old) old.remove();

  if (!S.appendices.length) return;

  const ta = document.getElementById("casestudy-ta");
  if (!ta) return;

  // Create a read-only rich-text overlay that shows [Fig. N] as hoverable tags
  // We position it over the textarea and hide the textarea text (make it transparent)
  // Actually: use a simpler approach — render a preview div BELOW the textarea
  // that shows the text with highlighted fig references and hover previews

  const wrap = document.createElement("div");
  wrap.id = "cs-fig-overlay-wrap";
  wrap.style.cssText = "margin-top:12px;";

  const lbl = document.createElement("div");
  lbl.style.cssText = "font-family:'DM Mono',monospace;font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:6px";
  lbl.textContent = "Figure references in your text";

  const preview = document.createElement("div");
  preview.id = "cs-fig-preview-text";
  preview.style.cssText = "font-size:13px;line-height:1.8;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;white-space:pre-wrap;word-break:break-word;max-height:160px;overflow-y:auto";

  // Build HTML with [Fig. N] → hoverable spans
  const text = S.caseStudy || "";
  const figRefs = S.appendices.map(a => a.label); // ["Fig. 1", "Fig. 2", ...]

  if (figRefs.length === 0 || !text) {
    wrap.remove();
    return;
  }

  // Check if any fig refs appear in text
  const hasFigRef = figRefs.some(f => text.includes("[" + f + "]"));
  if (!hasFigRef) {
    wrap.remove();
    return;
  }

  // Build regex to match [Fig. N]
  const escaped = figRefs.map(f => f.replace(".", "\.")).join("|");
  const regex = new RegExp("\[(" + escaped + ")\]", "g");
  const htmlContent = escHtml(text).replace(
    new RegExp("\[(" + figRefs.map(f => escHtml(f).replace(".", "\.")).join("|") + ")\]", "g"),
    (match, label) => {
      const img = S.appendices.find(a => a.label === label);
      if (!img) return match;
      return `<span class="fig-ref-tag" data-fig-id="${img.id}" data-fig-label="${label}">${match}</span>`;
    }
  );

  preview.innerHTML = htmlContent;
  wrap.appendChild(lbl);
  wrap.appendChild(preview);

  // Insert after textarea
  ta.insertAdjacentElement("afterend", wrap);

  // Attach hover events to spans
  preview.querySelectorAll(".fig-ref-tag").forEach(span => {
    span.addEventListener("mouseenter", (e) => {
      const figId  = span.dataset.figId;
      const figLbl = span.dataset.figLabel;
      const img    = S.appendices.find(a => a.id === figId);
      if (!img) return;
      const tooltip = document.getElementById("fig-preview-tooltip");
      document.getElementById("fig-preview-img").src = img.dataUrl;
      document.getElementById("fig-preview-lbl").textContent = figLbl + " — " + img.name;
      tooltip.style.display = "block";
      positionTooltip(e, tooltip);
    });
    span.addEventListener("mousemove", (e) => {
      const tooltip = document.getElementById("fig-preview-tooltip");
      positionTooltip(e, tooltip);
    });
    span.addEventListener("mouseleave", () => {
      document.getElementById("fig-preview-tooltip").style.display = "none";
    });
  });
}

function escHtml(s) {
  return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function positionTooltip(e, tooltip) {
  const margin = 14;
  let x = e.clientX + margin;
  let y = e.clientY + margin;
  const tw = tooltip.offsetWidth  || 280;
  const th = tooltip.offsetHeight || 220;
  if (x + tw > window.innerWidth  - 10) x = e.clientX - tw - margin;
  if (y + th > window.innerHeight - 10) y = e.clientY - th - margin;
  tooltip.style.left = x + "px";
  tooltip.style.top  = y + "px";
}
