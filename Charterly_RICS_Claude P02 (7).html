const GLOSSARY = {
  "ETH": {
    "name": "Ethics, Rules of Conduct and  professionalism",
    "desc": "This competency covers your professionalism. It requires you to understand the role of RICS and how it works. As your regulating body, you must have a thorough knowledge of its regulations, rules of conduct and ethical code. You should understand your role as a professional and society's expectations of professional practice. You should also understand the general principles of law and the legal system, as applicable in your country of practice.",
    "lreq": "3",
    "L1def": "Demonstrate knowledge and understanding of the role and significance of both the RICS and CICES. Your personal professional role and society's expectations of professional practice with consideration of the RICS code of conduct and conduct regulations, including the general principles of law and the legal system, as applicable in your country of practice. Demonstrate knowledge of current affairs and impact on the profession and the industry.",
    "L1ex": "Examples of knowledge comprised within this level are:\n• Understanding the RICS/CICES Institutions, their role and the role of the chartered/professional surveyor in the industry.\n• The structure of RICS/CICES\n• Appreciation of the benefits of embracing policies of fairness, equality, diversity and inclusion.\n• Knowledge of the industry in general, related current affairs, and their impact on the built environment market.\n• RICS/CICES global and professional ethical standards, the importance of professionalism, ethical behaviour, security mindedness and codes of conduct.\n• Mandatory Professional Statements e.g. Conflicts of Interest\n• Guidance notes and their status\n• RICS/CICES CPD policy\n• The role of RICS Professional Groups\n• Bodies within the institutions e.g. RICS Matrics, LionHeart\n• Rules of conduct for members\n• Rules of conduct for firms\n• Policy documents\n• RICS Bye-laws\n• Government, legislation and regulation\n• Common law\n• Relevant case law",
    "L2def": "Demonstrate evidence of practical application of this knowledge in your area of practice.",
    "L2ex": "Examples of activities and knowledge comprised within this level are:\n• Your involvement with RICS/CICES\n• Identifying a conflict of interest\n• Transparency in professional fees\n• Checking terms of appointment for compliance with RICS/CICES rules\n• Handling gifts and hospitality\n• Complying with RICS/CICES CPD policy for members\n• Checking your employer's compliance with RICS rules for firms.",
    "L3def": "Provide evidence of application of this knowledge in your area of practice in the context of advising clients.",
    "L3ex": "Examples of activities and knowledge comprised within this level are:\n• Dealing with a complaint\n• Handling client's money\n• Setting up professional indemnity insurance\n• Registration of a firm with RICS/CICES"
  },
  "CLT": {
    "name": "Client Care",
    "desc": "This competency covers how a surveyor meets a client's brief in respect of a specific appointment and how they deal with a client from a business and professional perspective.  The term \"client\" as it is used in this competency means not only the contractual party who has appointed the surveyor, but also all of the stakeholders in a project with whom the surveyor has to engage. This competency is closely linked to Ethics, Rules of Conduct and professionalism, which defines professional behaviour and sets out some mechanisms for protecting clients.",
    "lreq": "2",
    "L1def": "Demonstrate knowledge and understanding of the principles and practice of client care including: \n• The concept of identifying all clients/colleagues/third parties who are your clients and the behaviour that is appropriate to establish good client relationships \n• The systems and procedures that are appropriate for managing the process of client care, including complaints \n• The requirement to collect data, analyse and define the needs  of clients.",
    "L1ex": "Examples of knowledge comprised within this level are:\n• The information contained within a client's brief\n• Understanding the link between own role, the business and the customer's aims and objectives.\n• Identifying with business/customer needs, recognising risk, opportunities and threats and responding positively to changing requirements.\n• Understanding of the implications of civil engineering operations and the potential impact on the business/customer's business and/or reputation.\n• Operating in accordance with legal, business and/or customer's management, security, data protection and information systems.\n• Defining your scope of services within the limits of your competence and PI insurance\n• How fees are established\n• The use of standard forms of appointment\n• Mechanisms contained within an appointment document\n• Insurance requirements (legal and RICS)\n• How stakeholders are identified and how their status within the project is established. \n• Formal communication systems with clients and stakeholders\n• Complaints handling procedures\n• Key Performance Indicators (KPIs) The methods of data gathering during the inception stage of a project including client briefings and site-based information\n• The law applicable to your area of practice, in particular those relating to employment law, statutory compliance, consents and approvals\n• The principles of the preparation of alternative outline proposals, including the methodology of preparing option appraisals\n• The principles of preparing outline schedules of work.\n• Understand the need to prioritise business opportunities, proactively responding to change and seeking opportunities to employ innovative thinking by self and others to drive process and performance improvement.",
    "L2def": "Provide evidence of practical application of the principles and practice of client care in your area of practice.",
    "L2ex": "Examples of activities and knowledge comprised within this level are:\n• Establishing a client's objectives\n• Confirming a client's brief\n• Establishing a scope of services\n• Calculating fees for professional services\n• Compiling an appointment document\n• Establishing project stakeholders and their status\n• Setting up communication systems with a client and stakeholders\n• Issuing reports to a client e.g. cost reports\n• Dealing with a complaint\n• Measurement of KPIs\n• Analysing the data gathered through the client briefing process and formulating a detailed client brief\n• Consulting with the statutory authorities on the consents and other approvals required\n• Preparing alternative outline design proposals, including option appraisals\n• Preparing outline schedules of work\n• Assessing client relationships, team performance and stakeholder interfaces on international projects.",
    "L3def": "",
    "L3ex": ""
  },
  "COM": {
    "name": "Communication & Negotiation",
    "desc": "This competency covers the way in which a surveyor communicates, in writing, graphically and orally. It also looks at the process and strategy of a negotiation. Effective communication is a fundamental aspect of professionalism and candidates must be able to communicate complex technical matters to both technical and non-technical people in a clear fashion. Negotiation is a regular part of a surveyor's work and this competency deals with taking a systematic approach to achieving a satisfactory conclusion.",
    "lreq": "2",
    "L1def": "Demonstrate knowledge and understanding of effective oral, written, graphic and presentation skills including the methods and techniques that are appropriate to specific situations.",
    "L1ex": "Examples of knowledge comprised within this level are:\n• Selection of appropriate methods, demonstrating clarity (good grammar and spelling) and conciseness of communication, and facilitating the development of understanding in others.\n• The etiquette of written communication in emails, letters and reports\n• Presentation of both concept and detail in an articulate manner in well-chosen language in both oral and written form, backing up viewpoint with evidence, sound arguments and feeding the outcomes back.\n• Common formats for reports\n• Interpretation and making use of other people's ideas and suggestions with their support.\n• Demonstration of sound listening and note taking techniques and the ability to recall and retrieve information with accuracy.\n• How to deliver a report at a meeting\n• How to structure and deliver a presentation\n• Ensuring that they are in full possession of all information needed to make their case, articulating the facts with clarity, presenting their case logically, persuasively and with confidence.\n• Establishing your objectives and strategy for a negotiation\n• The process of negotiation.",
    "L2def": "Provide evidence of practical application of oral, written, graphic and presentation skills that are appropriate in a variety of situations, specifically including where negotiation is involved.",
    "L2ex": "Examples of activities and knowledge comprised within this level are:\n• Experience of constructing and presenting documents and reports in an appropriate and secure manner.\n• Participate in meetings with confidence. Manage conversations and debates to encourage two-way communication and actions including their communication.\n• Compiling minutes of meetings\n• Presentation of figures and data using spreadsheets, graphs and charts\n• Producing pricing documents\n• Delivering reports at meetings\n• Taking part in interviews e.g. for contractor selection\n• Giving presentations to staff or project teams\n• Negotiating a loss and expense claim, extension of time, acceleration programme, contract sum or final account\n• Agreeing the value of an instruction.\n• Gets to the core issues quickly and spotting the point at which to make a trade off.\n• Understanding of ethical and political issues, able to see the big picture and to seek win-win situations.\n• Listens sensitively to other's viewpoint, addressing possible concerns and objections but standing their own ground when required.",
    "L3def": "",
    "L3ex": ""
  },
  "HSE": {
    "name": "Health & Safety",
    "desc": "This competency covers the relationship between the work of the surveyor and health and safety issues. Candidates should understand the legal, practical and regulatory requirements. They should have a detailed understanding of the health and safety processes and guidelines used to achieve this",
    "lreq": "2",
    "L1def": "Demonstrate knowledge and understanding of the principles and responsibilities imposed by law, codes of practice and other regulations appropriate to your area of practice.",
    "L1ex": "Examples of knowledge comprised within this level are:\n• Personal safety on site and in the office\n• Health, safety and environmental legislation.\n• Procedures imposed by law\n• Specific regulations relevant to your area of work e.g. Fire safety standards\n• The impact on health and safety of: design, construction processes, building maintenance\n• Health and safety training requirements as it relates to the employment of staff.\n• Sustainability issues and options in construction and maintenance including the efficient use of resource and their likely impact on climate change and global warming.",
    "L2def": "Apply evidence of practical application of health and safety issues and the requirements for compliance, in your area of practice.",
    "L2ex": "Examples of activities and knowledge comprised within this level are:\n• Proactive approach to health, safety and welfare in the workplace.  \n• Obtaining formal health and safety qualifications including first aid, industry specific or nationally recognised qualifications\n• Interpretation of construction health, safety and welfare and environmental protection processes and procedures in the workplace, including hazard identification and risk mitigation. \n• Interpretation or implementation of method statements relating to personal and general site operations, including safe systems of work, pollution prevention and control and protection of the environment.\n• Being involved with specific roles and responsibilities within the various regulations\n• Being involved in specific health and safety audits/reviews\n• Reviewing health and safety proposals as part of a contractor's tender.",
    "L3def": "",
    "L3ex": ""
  },
  "DAT": {
    "name": "Data Management",
    "desc": "This competency covers how data relating to individual projects and a surveyor's work generally is collected, stored and retrieved. In addition to understanding the different storage systems and data sources available and knowing how they work, a candidate should also understand the principles behind the systems and what makes them effective. Candidates should also understand how general information and data is managed on a project and the increasing use of computerised central project databases.",
    "lreq": "1",
    "L1def": "Demonstrate knowledge and understanding of the sources of information and data, and the systems applicable to your area of practice, including the methodologies and techniques most appropriate to collect, collate and store data.",
    "L1ex": "Examples of knowledge comprised within this level are:\n• The use of published sources of data\n• Digital licences i.e. who owns the survey data, copyright issues\n• How data is collected, analysed and stored within your employer's organisation\n• How project information is stored within your employer's organisation\n• How electronic database systems work\n• The use of computerised central project databases or Building Information Modelling, the benefits, challenges and dangers\n• How technical libraries are set up and used\n• Legislation applicable to data management and data access.\n• BIM, including the security implications of this and similar management tools\n• BIM Naming (ISO19650)\n• Project / Drawing Naming \n• Version control\n• Archiving e.g. retention schedule",
    "L2def": "",
    "L2ex": "",
    "L3def": "",
    "L3ex": ""
  },
  "ACC": {
    "name": "Accounting Principles & Procedures",
    "desc": "This competency covers the basic principles of accounting and the interpretation of company accounts in order that reasoned advice can be given to clients.",
    "lreq": "1",
    "L1def": "Demonstrate knowledge and understanding of accounting concepts and the format and preparation of management and company accounts, including profit and loss statements, cash flow statements and balance sheets.",
    "L1ex": "Examples of knowledge comprised within this level are:\n• The Generally Accepted Accounting Principles (GAAP) relevant to the candidate's geographical area of experience and how property is treated in an entity's accounts\n• International Accounting Standards (IAS), broadly how IAS vary from National GAAP and how a property/asset is treated in an entity's accounts prepared under IAS\n• An entity's financial results and basic accounting principles including balance sheets, profit and loss, and cash flow statements\n• The role of the auditor.",
    "L2def": "",
    "L2ex": "",
    "L3def": "",
    "L3ex": ""
  },
  "BPL": {
    "name": "Business planning",
    "desc": "This competency is about the principles and tools of business planning.",
    "lreq": "1",
    "L1def": "Demonstrate knowledge and understanding of how business planning activities contribute to the achievement of corporate objectives.",
    "L1ex": "Examples of knowledge comprised within this level are:\n• Types of business plan (e.g. strategic, departmental, operational, corporate)\n• The essential elements of a business plan\n• Organisational structures\n• Methods for financial benchmarking (e.g. key financial ratios)\n• Meaning of working capital, stock, debtors and creditors\n• Accounting techniques\n• Forecasting techniques\n• Planning to meet corporate objectives.",
    "L2def": "",
    "L2ex": "",
    "L3def": "",
    "L3ex": ""
  },
  "CDR": {
    "name": "Conflict avoidance, management and dispute resolution procedures",
    "desc": "This covers the recognition, avoidance, management and resolution of disputes, involving an awareness of different dispute resolution procedures and an understanding of the application of dispute resolution procedures appropriate to the area and jurisdiction of professional practice.",
    "lreq": "1",
    "L1def": "Demonstrate knowledge and understanding of the techniques for conflict avoidance, conflict management and dispute resolution procedures including for example adjudication and arbitration, appropriate to your pathway.",
    "L1ex": "Examples of knowledge comprised within this level are:\n• Common causes of disputes\n• The contribution of some of the following to dispute avoidance:\n– Risk management\n– Early warning systems\n– Partnering techniques\n– Clear and robust client briefings\n• Theories of negotiation and the role of effective communication and negotiation\n• The primary features, advantages and disadvantages of a range of dispute resolution procedures and their surrounding statutory and/or non-statutory legal/ judicial context, for example:\n– Mediation and conciliation\n– Dispute Resolution Boards (DRBs)\n– Dispute Resolution Advisers (DRAs)\n– Adjudication\n– Independent Expert determination\n– Arbitration\n– Professional Arbitration on Court Terms (PACT)\n– Court proceedings/litigation\n• The possible roles of a surveyor as an expert witness and/or an advocate, to include an awareness of the existence and scope of applicability of RICS guidance for expert witnesses and advocates\n• The range of nominating bodies and services available to resolve disputes, and particularly the role of the RICS Dispute Resolution Service and any specialised dispute resolution schemes it offers relevant to your market sector\n• The RICS Global Professional Statement on Conflict of Interest and any appropriate national RICS guidance.",
    "L2def": "Provide evidence of practical application in your area of practice having regard to the relevant law.",
    "L2ex": "Examples of activities and knowledge comprised within this level are:\n• Adopting – or encouraging the adoption of (as appropriate) – suitable dispute avoidance techniques\n• Negotiating actively on behalf of clients prior to third-party referral\n• Assisting in the collation or preparation of claims/counterclaims and representations\n• Assisting in the identification, gathering and collation of facts and expert evidence for use in expert reports\n• Sufficient understanding of the main points of the statutory or non-statutory law relevant to/underpinning any particular dispute resolution process and its application.",
    "L3def": "Provide evidence of the application in the context of advising clients in the various circumstances referred to.",
    "L3ex": "Examples of activities and knowledge comprised within this level are:\n• Advising clients of the most suitable means of dispute avoidance on their projects, and of dispute resolution procedures appropriate to their individual circumstances, demonstrating appreciation of when to seek further specialist advice and when to advise clients within the scope of the insurance cover of the candidate's organisation\n• Providing advice to clients over protection on the issue of costs of dispute resolution proceedings (e.g. Calderbank offers or liaising with solicitors over the content of Part 36 Offers)\n• Involvement in, or assistance with, a referral to a third-party resolution process and associated management of that process on behalf of client"
  },
  "DIV": {
    "name": "Diversity, inclusion and teamwork",
    "desc": "This competency covers the role of the surveyor within the team and their involvement with the establishment of the team. It deals with how team members interact, their behaviour and communication. It also looks at how to build a diverse and inclusive team and the resulting benefits for both the individual and the team.",
    "lreq": "1",
    "L1def": "Demonstrate knowledge and understanding of the principles, behaviour and dynamics of successfully working in a team.",
    "L1ex": "Examples of knowledge comprised within this level are:\n• How team members are selected and appointed\n• The role played by the various team members\n• The importance and business value of diversity in a team\n• Formal communication processes within the team\n• Inclusive communications\n• How partnering and collaborative working affects the team\n• Internal diversity and inclusion polices, including any applicable to non-discrimination or anti-harassment in the workplace\n• Unconscious bias\n• Supply chain management\n• Relevant legislation within your area of practice.",
    "L2def": "",
    "L2ex": "",
    "L3def": "",
    "L3ex": ""
  },
  "INC": {
    "name": "Inclusive environments",
    "desc": "This competency is about the principles and processes that deliver accessible and inclusive environments, recognising the diversity of user needs and the requirement to put people (of all ages and abilities) at the heart of the process.  An inclusive environment recognises and accommodates differences in the way people use the built and natural environment. It facilitates dignified, equal and intuitive use by everyone. It does not physically or socially separate, discriminate or isolate. It readily accommodates and welcomes diverse user needs.",
    "lreq": "1",
    "L1def": "Demonstrate an understanding of the principles and processes that deliver accessible and inclusive environments, recognising the diversity of user needs and the requirement to put people (of all ages and abilities) at the heart of the process. In doing so, have regard to the legal, economic, sustainable and social case for making inclusion the norm not the exception.",
    "L1ex": "Examples of knowledge comprised within this level are:\n• Recognition of the diversity of user needs\n• Local planning policy, building regulation and health and safety requirements as applied to inclusive environments\n• Appreciate and distinguish between ethical issues as opposed to legal requirements\n• Knowledge of best practice technical standards relevant to country of practice.",
    "L2def": "",
    "L2ex": "",
    "L3def": "",
    "L3ex": ""
  },
  "SUS": {
    "name": "Sustainability",
    "desc": "This competency covers the role of the surveyor in dealing with the impact of sustainability issues. Achievement of this competency demonstrates a broad-based understanding of the theory of sustainability as set in its political and legal framework, together with an appreciation of its economic, social and environmental context and the tools and techniques used to measure cost and return, and evaluate options for action.",
    "lreq": "1",
    "L1def": "Demonstrate knowledge and understanding of why and how sustainability seeks to balance economic, environmental and social objectives at global, national and local levels in the context of land, property and the built environment.",
    "L1ex": "Examples of knowledge comprised within this level are:\n• The principles of sustainability within the development process\n• The relationship between property and the environment\n• How national and international legislation, regulations and taxation relating to sustainability affect a project\n• Criteria by which sustainability is measured in relation to finished buildings\n• The principles of how design, technology and construction processes can contribute to sustainable building\n• Design considerations – site, location, building form, materials, lighting, ventilation, heating, water and drainage\n• Sources of renewable energy and energy recovery\n• The principles of material resource efficiency within the supply chain.",
    "L2def": "",
    "L2ex": "",
    "L3def": "",
    "L3ex": ""
  },
  "CAD": {
    "name": "Cadastre and land administration",
    "desc": "This competency deals with assessing documents relating to the demarcation, registration and transfer of land in order to define, on the ground, the extent of legal and/or registered title. It involves the preparation of expert lucid reports for the legal profession and provision of opinions to the legal profession and property owners.",
    "lreq": "0/3",
    "L1def": "Demonstrate knowledge and understanding of field and office procedures for boundary and/or cadastral surveys appropriate to your national and/or international location. Understand legal and physical boundaries and provide examples of these. Understand the principles of land management.",
    "L1ex": "Examples of knowledge comprised within this level are:\n• RICS/TSA guidence for Boundaries (e.g.RICS - procedures for boundary identification, demarcation and dispute resolution, UK Guidance Note, 4th edition)\n• What constitutes a Title Reconciliation (Title Rec)\n• Identifying clients (developers or property surveyors)\n• Understanding if there is there a dispute or requirement to ascertain the boundary position\n• Acuracy requirement\n• Global economic and market conditions\n• The changing nature of business\n• Core business drivers\n• Clear view of what is meant by a business's vision and mission\n• Organisational structures, values and objectives\n• Business performance\n• Strategic use of real estate\n• Decentralised vs centralised\n• Organisational objectives.",
    "L2def": "Apply your knowledge of the principles of land registration, land management, administration and legislation related to rights in real estate internationally and nationally. Understand the relationship between the surveyor, client and legal profession and preparation of evidence for the legal process.",
    "L2ex": "Examples of activities and knowledge comprised within this level are:\n• Aquire title from the Land Registry, bring into AutoCAD rotate and scale it.\n• Survey and add topographical detail to the title (usually just boundary features, building lines and walls)\n• Adopting appropriate scales for measured surveys to be used in cadastre\n• Choosing which documentation to rely upon\n• Practising with complete independence from the client\n• Requesting documents from the legal profession\n• Obtaining documents from the Land Registries\n• Using and interpreting of aerial photography and digital imagery\n• Reporting relevant matters back to the legal profession\n• Understanding of the requirements for determining boundaries.",
    "L3def": "Provide evidence of reasoned advice, and fully understand the role and responsibility of an expert witness, on the resolution of disputes by litigation and alternative procedures.",
    "L3ex": "Examples of activities and knowledge comprised within this level are:\n• Advising on the duty of an expert to the court\n• Preparing expert reports for use in litigation\n• Advising on the requirements of an expert witness within the civil procedure rules\n• Advising on the requirements and role of an expert at a 'meeting of experts'\n• Advising on the role of an expert at a 'conference with counsel'\n• Preparing for trial\n• Advising on the role of an expert during and after the trial\n• An appreciation of alternative dispute resolution options, particularly the differences and advantages/disadvantages when comparing mediation with arbitration."
  },
  "ENG": {
    "name": "Engineering Surveying",
    "desc": "Advise on the selection and application of particular processes  within the area of experience. This should include liaison with specialists and consultants to develop project-specific design and construction solutions.",
    "lreq": "0/3",
    "L1def": "Demonstrate knowledge and understanding of the principles of the design, methodology, logistics and construction in the chosen field of practice.",
    "L1ex": "Examples of knowledge comprised within this level are:\n• Types of ground markers, installation techniques and suitability for use\n• Requirements for survey data capture and presentation for design purposes in your field of operation\n• Setting-out techniques\n• The importance of comparison of designed and as-built spatial locations\n• Be conversant with construction drawings, plans and surveys\n• Site health and safety issues\n• Basic principles of civil engineering, terminology and construction techniques.",
    "L2def": "Apply the knowledge to an understanding of the systems, components, timing, methodologies and logistics of the construction of infrastructure projects in the chosen field of practice.",
    "L2ex": "Examples of activities and knowledge comprised within this level are:\n• Recognising options, choosing and justifying instrument suitability for use in engineering projects\n• Understanding accuracies and errors and how they apply\n• Checking the work of others\n• Leading the work of teams and individuals\n• Identifying hazards and undertaking risk assessments\n• Producing method statements for site survey activities\n• Communicating and presenting results of surveys to others.",
    "L3def": "Advise on the selection and application of particular processes  within the area of experience. This should include liaison with specialists and consultants to develop project-specific design and construction solutions.",
    "L3ex": "Examples of activities and knowledge comprised within this level are:\n• Designing and supervising provision, observation, computation and checking of plan and height control\n• Advising other construction/design professionals on all aspects of site measurement; contributing to project management team decision-making\n• Producing project resource plans and budgets for programmes of work\n• Defining survey processes and assessing accuracy and tolerances of survey systems\n• Managing the engineering survey element within a large project\n• Understanding and analysing the impact of your decisions on all aspects of the project\n• Implementing project health and safety strategy for site surveying elements of a project."
  },
  "GDS": {
    "name": "Geodesy",
    "desc": "Geodesy is an interdisciplinary science which uses remotely sensed and ground-based measurements to study the shape and size of the earth and their temporal variations. Geodesy also includes the study of the earth's gravity field. Geodesy can be divided into: geomensuration, which is concerned with measuring the earth on a global scale, and surveying, which is concerned with measuring parts of the surface. Understanding the key elements of Geodesy is a primary skill required by land and hydrographic surveyors",
    "lreq": "0/3",
    "L1def": "Demonstrate knowledge and understanding of the principles of geodesy, Global Navigation Satellite Systems, global / regional / national geodetic reference systems, geoids, datums, scale factor and projections.",
    "L1ex": "Examples of knowledge comprised within this level are:\n• Geographic coordinate systems e.g. latitude & longitude, GNSS systems\n• Rectilinearcoordinate systems e.g. Cartesian coordinate systems and national / international systems.\n• Linear referencing systems e.g. rail, pipeline chainage, SnakeGrid\n• The difference between geoid and ellipsoid\n• The differences between types of projections, with their advantages and disadvantages e.g. Mercator\n• Scale factors –when to apply and impact of them\n• Earth curvature effects\n• The applications and limitations of Global Navigation Satellite System (GNSS), with emphasis on GPS\n• The definition of a datum, and the existence of datums relevant to the location of the candidate.\n• Datums and an understanding of the different origin of horizontal and vertical control e.g. GNSS\n• Datum transformation methods and their pros and cons e.g. shift, conformal 7 parameter\n• Coordinate conversions e.g. Cartesian to geographic and vice versa",
    "L2def": "Apply your knowledge in practice, specify and plan surveys and instrumentation needs, including error sources and 'fitness for purpose' of data. Use Company and industry standard software and apply network adjustments and/or transformations and apply independent checks to the validity of then results.",
    "L2ex": "Examples of activities and knowledge comprised within this level are:\n• Understanding the various modes of GNSS (GPS) positioning (static, rapid static, kinematic, real-time kinematic)\n• Understanding the levels of accuracy achievable, equipment, data collection and processing strategies required for a variety of surveying/engineering tasks including: topographic survey, setting out, control establishment\n• Planning and executing relevant GNSS (GPS) surveys to appropriate levels of accuracy, including data processing\n• Using standard commercial GNSS (GPS) processing packages and appropriate transformation routines to transform GPS based coordinates to national datums.",
    "L3def": "Provide evidence of reasoned advice to colleagues and clients on advanced practice and planning. Use advanced software and carry out adjustments and analysis. Advise on client specifications and final product needs.",
    "L3ex": "Examples of activities and knowledge comprised within this level are:\n• Understanding differences between various obit products, where to obtain and when to apply\n• Being able to select and apply appropriate models/estimation strategies within commercial GNSS (GPS) processing software e.g. tropospheric estimation\n• Being able to advise clients on detailed design, observation and processing requirements for high precision or large scale projects\n• Producing and commenting final processing reports and comment from a strong knowledge base on levels of achieved accuracies\n• Supervising and training junior colleagues in the field use of GPS equipment and data processing techniques."
  },
  "MSR": {
    "name": "Measurement",
    "desc": "This competency is relevant to all data capture and surveying/measurement areas of practice, particularly, topographic land survey, engineering surveying and measured building survey. It is also relevant to boundary surveys, surveys for rental, ratings and valuations, initial field visit surveys and high accuracy as-built surveys or large-scale utilities surveys",
    "lreq": "0/3",
    "L1def": "Demonstrate knowledge and understanding of the principles and limitations of measurement relevant to your area of practice.",
    "L1ex": "Examples of knowledge comprised within this level are:\n• All checking procedures and be able to ascertain the suitability of different instrumentation and measurement techniques\n• The principles of error sources\n• Data capture techniques and limitations of use\n• Different basic survey instrumentation (EDMs, automatic levels, lasers etc.)\n• The principles of data representation and the use of appropriate data capture techniques to achieve agreed survey output.",
    "L2def": "Apply your knowledge to undertake measurement and processing. Use basic and/or advanced instrumentation to collect data. Present appropriate information gained from the measurement.",
    "L2ex": "Examples of activities and knowledge comprised within this level are:\n• Using advanced data capture instrumentation such as reflectorless EDM, GPS, handheld GIS data capture tools, laser scanners etc.\n• Understanding the principles of measured building surveying and its outputs\n• Surveyingmethods to be adopted\n• Use of GNSSand its benefits over other methods\n• Understanding the differences between different data capture techniques and their fitness for purpose\n• Producing final output and utilising post processing techniques\n• Understanding specifications and guidance.\n• Remote sensing\n• Data abstraction, classification, selection \n• Data formats e.g. DXF, DGN, DWG\n• ETL (extract, transform, load) e.g. DWG to Shapefile\n• Computation including an understanding of trig and traverse computations",
    "L3def": "Evaluate, present, manage, analyse data and/or apply spatial data and information. Show an advanced understanding of accuracy, precision and error sources.",
    "L3ex": "Examples of activities and knowledge comprised within this level are:\n• Being fully conversant with all RICS geomatics specification and guidance and other official RICS guidance as appropriate to your area of practice\n• Appreciating all legislative issues such as health and safety \n• Advising on appropriate data capture techniques\n• Explaining complex survey data capture techniques and terminology to clients\n• Describing the principles of metadata and property data information and compatibility."
  },
  "RSP": {
    "name": "Remote sensing and photogrammetry",
    "desc": "Remote sensing and photogrammetry are activities and methods related to provision of spatial information. This involves using photographs and digital imagery to provide information about the earth's surface and changes which occur within the landscape. It also covers the science and technology of making precise measurements on the imagery to model, in three dimensions, the landscape and features or structures on the earth's surface",
    "lreq": "0/3",
    "L1def": "Demonstrate knowledge and understanding of the principles of remote sensing and photogrammetry (both aerial and terrestrial).",
    "L1ex": "Examples of knowledge comprised within this level are:\n• Principles of photogrammetry\n – Camera geometry – scales, precision, ground sample distance\n – Properties of photography – principal point, radial properties\n• Principles of remote sensing\n – Sensors – geometric characteristics\n – Image processing\n• Types of imagery, the source of acquisition, and their practical application\n – Remote sensed data – infra-red, panchromatic, colour, thermal\n – Stereo photography and the requirements to achieve 3D measurement\n – Oblique photography\n – Ortho-photography (true, ortho-rectified, geo-rectified).",
    "L2def": "Apply your knowledge of scales, camera and satellite principles and different data capture techniques. Understand and undertake procedures for routine data capture, and analyse and/or adjust/ transform data. Use standard industry software.",
    "L2ex": "Examples of activities and knowledge comprised within this level are:\n• Interpreting of specifications\n• Setting up equipment – resolving interior and exterior orientations\n• Providing ground control – aerial triangulation\n• Digital Surface Modelling – techniques\n• 3D data capture.",
    "L3def": "Provide evidence of fit-for-purpose advice on client requirements. Identify and assess client specifications. Use advanced industry software and advise on data transfer and/or format.",
    "L3ex": "Examples of activities and knowledge comprised within this level are:\n• Providing reasoned advice on tenders and contracts\n• Comparing and advising on benefits of alternative methodology\n• Project design and drafting of quality plans and method statements\n• Project and contract management\n• Producing reports, error detection and analysis."
  },
  "SMP": {
    "name": "Surveying & Mapping",
    "desc": "Provide evidence of reasoned advice on the design and specification of mapping and/or geo-information projects in a national and/or international context.",
    "lreq": "0/3",
    "L1def": "Demonstrate knowledge and understanding of the principles of mapping and geographic information sciences appropriate to Company, including the accuracy, scale, currency and fitness for purpose of hardcopy and/or digital maps, drawings, imagery and plans.",
    "L1ex": "Examples of knowledge comprised within this level are:\n• The limitations of use of spatial data capture instrumentation and techniques\n• Instrument checking techniques\n• The basic principles of geodesy and its application to mapping per your area of practice\n• Basic survey software\n• Data quality and checking criteria and techniques\n• The issues around visual representation of spatial data and its relationship with data capture techniques\n• Understand scalability, fitness for purpose and accuracy constraints.",
    "L2def": "Apply your knowledge of mapping and geographical sciences in the preparation of geospatial data in relation to your area of practice within Company.",
    "L2ex": "Examples of activities and knowledge comprised within this level are:\n• Authoring 2D or 3D representation/model\n• Knowlege of outputs (e.g. PDF)\n• Textual e.g. metadata, schedules\n• Paper e.g. contract drawings, CPO drawings\n• Cartography skills, such as presentation (i.e. use of type face, no overwriting), scale & generalisation (i.e. correct scale for the job), colour, Typography, Symbology.\n• Using modern survey instrumentation and understanding checking/calibration techniques\n• Using post processing survey/mapping software competently\n• Using survey industry standard software and post processing techniques\n• Understanding the principles of data integration and compatibility, integrating different data sets to achieve client needs\n• Understanding scalability in the context of both mapping and user requirements\n• Using imagery software and GIS data capture tools\n• A good understanding of error sources, probability and statistical analysis according to your area of practice\n• Being fully conversant with the production of digital terrain models, digital elevation modelling and data integration techniques (overlaying OS map layers with surveyed topographical data for example)\n• Understanding survey contracts and specifications (in conjunction with senior colleagues).",
    "L3def": "Provide evidence of reasoned advice to clients on the design and specification of mapping and/or geo-information projects in a national and/or international context.",
    "L3ex": "Examples of activities and knowledge comprised within this level are:\n• Using all forms of survey/mapping/imagery contracts competently and describing the nuances of each (i.e. accuracy/fitness for purpose issues)\n• Being fully conversant with all RICS/CICES/TSA Geomatics specifications and guidance in relation to mapping\n• Explaining complex mapping issues to clients and discerning their 'actual' needs."
  },
  "SLS": {
    "name": "Surveying Land and Sea",
    "desc": "This competency covers aspects of both terrestrial and marine surveying. It involves the collection, processing, analysis and dissemination of geospatial data",
    "lreq": "0/3",
    "L1def": "Demonstrate knowledge and understanding of the principles of geomatics and the various applications of its techniques within the natural, maritime and built environments",
    "L1ex": "Examples of knowledge comprised within this level are:\n• Collecting and quality controlling spatial data for control networks and/or topographic detail surveys\n• Collecting and quality controlling spatial data for Measured Building Surveying\n• Photogrammetry, Laser Scanning and Remote Sensing\n• Utility Surveying\n• Conducting engineering surveys to provide dimensional control, setting out, machine control, volume calculations and QA checks for the construction industry\n• Collecting and/or manipulating data for a specific use within a Geographic Information System (GIS)\n• Use of GNSSe.g. land surveying or machine control\n• Conducting Photogrammetric measurements (2D or 3D) from photographs or imagery stored electronically.\n• Conducting marine navigation and offshore data collection for exploration and exploitation purposes\n• Hydrographic Surveying",
    "L2def": "Apply your knowledge by identifying, planning and assessing survey requirements, specifications and appropriate instrumentation. Use industry standard survey and/or offshore software, and demonstrate an understanding of the principles, uses and limitations of Global Navigation Satellite Systems and other navigation systems",
    "L2ex": "Examples of activities and knowledge comprised within this level are:\n• Being responsible for and ensuring that survey equipment is fully calibrated, and understanding the importance of calibration methods and the relationship to data quality\n• Undertaking post-process GNSS observations and performing adjustments within a network\n• Performing datum transformations and understanding the relationship between local datum and global datums\n• Being involved in project initiation and execution as Senior Surveyor including assessment of survey requirements, equipment specifications and suitability\n• Working directly with program managers, software development engineers, and testers to write documentation that helps customers understand and use a GIS system.",
    "L3def": "Define and assess client needs. Define specifications and prepare tenders and/or contracts. Demonstrate that you are fully conversant with the principles of geodesy on a national, international and/or maritime basis",
    "L3ex": "Examples of activities and knowledge comprised within this level are:\n• Assuming full responsibility for the initiation of a survey in accordance with the approved project specific and standard survey procedures, customer requirements and technical specifications\n• Sourcing, managing and assessing survey contractors performing work on your behalf\n• Helping to create the overall direction, strategy, and coordination for the business development and marketing of a GIS product and service\n• Advising clients upon coastal processes and the potential impact of any activity and/or construction in the nearshore environment.\n• Advising clients on national/ international policy and legislation and its influence on survey activities."
  },
  "BDT": {
    "name": "Big Data",
    "desc": "Provide evidence of design and implementation of big data analysis using algorithms to handle data sets in a scientific computing environment for the analysis of big data.",
    "lreq": "2/3",
    "L1def": "Demonstrate knowledge and awareness of the principles of big data processing, the range of available sources of big data, data dynamics and a critical appreciation of the latest big data research issues.",
    "L1ex": "Examples of knowledge comprised within this level are:\n• The different phases of software lifecycle\n• The value of analysis and which data sources, analytical techniques and tools can be used\n• How algorithms are designed, optimised and applied at scale\n• What data is important to ensure business performance\n• The importance of presentation and applicability of any data that is captured through dashboards or client portals\n• Have an appreciation of the possible benefits of Machine learning and Artificial Intelligence and how this can be supported through data\n• The various Computer Aided packages that are available in the marketplace\n• The principles of a technical security architecture and how these can be used to reduce information risk\n• The principles of Information Security Governance and the purpose of Information Security strategies\n• Legislative and regulatory instruments relevant to Information Security relevant to own area of practice and location\n• Beyond RICS' ethical standards, candidates should understand and adhere to the applicable data science ethics framework.",
    "L2def": "Demonstrate an understanding of the techniques and the tools required for the maintenance of data quality, data hygiene and the statistical modelling, analysis and visual data interrogation of big data sets.",
    "L2ex": "Examples of activities and knowledge comprised within this level are:\n• Ability to source, access, manipulate and engineer data processes with data that typically have characteristics of volume, velocity and variety\n• Can select and use appropriate statistical methods for sampling, distribution assessment, bias and error\n• Different data engineering tools for repeatable data processing and can compare between different data models\n• Build credible statistical models from the data and use best coding practices to generate reproducible work\n• Problem structuring methods and evaluating when each method is appropriate\n• Draw on relevant technical and analytical standards from across government and industry\n• Expose data from systems (for example, through APIs), link data from multiple systems and deliver streaming services\n• Works with other technologists and analysts to integrate and separate data feeds to map, produce, transform and test scalable data products that meet client needs\n• Applies scientific methods through experimental design, exploratory data analysis and hypothesis testing to reach robust conclusions\n• The ability to data mine and discover trends or sequences that can inform and direct business direction.",
    "L3def": "Provide evidence of design and implementation of big data analysis using algorithms to handle data sets in a scientific computing environment for the analysis of big data.",
    "L3ex": "Examples of activities and knowledge comprised within this level are:\n• Be able to explore and visualise the data to present the 'story' of the data in a meaningful way to a range of technical and nontechnical audiences \n• Advise on how big data can be used to support strategic and operational decision making to create impact and add value from its use\n• Advise on the selection, design, justification, implementation and operation of controls and management strategies to maintain the security, confidentiality, integrity, availability, accountability and relevant compliance of information systems with legislation, regulation and relevant standards\n• Driving business change through the application of big data analytics\n• Advise on the future of big data."
  },
  "BIM": {
    "name": "BIM Management",
    "desc": "Show how the knowledge and experience gained in this competency has been applied to advising clients and/or senior management on BIM strategy.",
    "lreq": "2/3",
    "L1def": "Demonstrate knowledge and understanding of the technical, process and collaborative aspects of the use of BIM.",
    "L1ex": "Examples of knowledge comprised within this level are:\n• BIM strategies and implementation\n• The various technical options and solutions for using information modelling\n• The collaborative processes necessary for BIM adoption\n• Standard classification systems and their use in infrastructure\n• Relevant internationally recognised management standards such as Construction Operations Building Information Exchange (COBie).",
    "L2def": "Develop and apply management systems to facilitate the use of BIM on projects, including unified control and reporting procedures.",

const gb   = c => c.base || c.id;
const boOf = (id, list) => { const c = list.find(x=>x.id===id); return c ? gb(c) : id; };
const cw   = t => (!t||!t.trim()) ? 0 : t.trim().split(/\s+/).filter(Boolean).length;

// bases used by sections other than `skip`
function usedBases(skip) {
  const s = new Set();
  if (skip!=="spec" && S.sel.spec) s.add(boOf(S.sel.spec, getCoreList()));
  if (skip!=="opt")  S.sel.opt.forEach(id => s.add(boOf(id, getOptList())));
  if (skip!=="tech" && S.sel.tech) s.add(boOf(S.sel.tech, getTechList()));
  return s;
}

// how many of the 3 core Level-3 slots are filled
function coreCount() {
  return S.sel.core.length + (S.sel.sf3Level===3 ? 1 : 0);
}

function buildAllComps() {
  const core = getCoreList(); const opt = getOptList(); const tech = getTechList();
  const list = [];
  MANDATORY.forEach(m => list.push({id:m.id, name:m.name, cat:"Mandatory", req:m.req}));
  S.sel.core.forEach(id => {
    const c = core.find(x=>x.id===id);
    if (c) list.push({id:c.id, name:c.name, cat:"Core", req:3});
  });
  list.push({id:"MSR", name:"Measurement", cat:"Core — Measurement", req:S.sel.sf3Level});
  if (S.sel.spec) {
    const c = core.find(x=>x.id===S.sel.spec);
    if (c) list.push({id:c.id, name:c.name, cat:"Specialism", req:3});
  }
  S.sel.opt.forEach(id => {
    const c = opt.find(x=>x.id===id);
    if (c) list.push({id:c.id, name:c.name, cat:"Optional", req:2});
  });
  if (S.sel.tech) {
    const c = tech.find(x=>x.id===S.sel.tech);
    if (c) list.push({id:c.id, name:c.name, cat:"Technical", req:2});
  }
  return list;
}

function calcProgress() {
  const comps = buildAllComps();
  // RPQ route: progress is CPD-only (no statements or case study)
  if (isRPQRoute()) {
    const cpdEntries = S.cpd || [];
    const cvEntries  = S.cv  || [];
    const cpdOk = cpdEntries.length > 0;
    const cvOk  = cvEntries.length  > 0;
    return Math.round(((cpdOk ? 1 : 0) + (cvOk ? 1 : 0)) / 2 * 100);
  }

  let t=0,d=0;
  comps.forEach(comp => {
    for (let l=1;l<=comp.req;l++) {
      t++;
      if (cw(S.statements[`${comp.id}_L${l}`]) >= Math.floor(WORD_TARGETS[l]*0.5)) d++;
    }
  });
  t++; if (cw(S.caseStudy)>=500) d++;
  return t ? Math.round((d/t)*100) : 0;
}

function validate() {
  const e = [];
  const ct = coreCount();
  if (ct < 3) e.push(`Select ${3-ct} more Core Competency slot(s) to Level 3 — Measurement at Level 3 counts as one slot.`);
  if (getDesigs() && !S.sel.spec) e.push("Specialism not set — please go back to Pathway and choose a designation.");
  if (S.sel.opt.length < 2) e.push("Select exactly 2 Optional Competencies to Level 2.");
  if (!S.sel.tech) e.push("Select 1 Technical Competency to Level 2.");
  S.valErrs = e;
  return e.length === 0;
}

function downloadCompCSV() {
  // Build complete list of all available competencies across all groups
  const rows = [['Group','ID','Name','Required Level','Selected','Your Internal Name/Reference']];

  // Mandatory — all auto-included
  MANDATORY.forEach(m => {
    rows.push(['Mandatory', m.id, m.name, m.req, 'Yes', S.compAliases?.[m.id] || '']);
  });

  // Core — mark selected vs available
  const selectedCoreIds = new Set([...S.sel.core, 'MSR']);
  getCoreList().filter(c => c.id !== S.sel.spec).forEach(c => {
    const sel = selectedCoreIds.has(c.id) ? 'Yes' : 'No';
    const req = c.id === 'MSR' ? S.sel.sf3Level : 3;
    rows.push(['Core', c.id, c.name, req, sel, S.compAliases?.[c.id] || '']);
  });

  // Specialism — auto-set from designation
  if (S.sel.spec) {
    const sc = getCoreList().find(c => c.id === S.sel.spec);
    if (sc) rows.push(['Specialism', sc.id, sc.name, 3, 'Yes (Auto)', S.compAliases?.[sc.id] || '']);
  }

  // Optional — all available, mark selected
  const selectedOptIds = new Set(S.sel.opt);
  getOptList().forEach(c => {
    rows.push(['Optional', c.id, c.name, 2, selectedOptIds.has(c.id) ? 'Yes' : 'No', S.compAliases?.[c.id] || '']);
  });

  // Technical — all available, mark selected
  getTechList().forEach(c => {
    rows.push(['Technical', c.id, c.name, 2, c.id === S.sel.tech ? 'Yes' : 'No', S.compAliases?.[c.id] || '']);
  });

  const csv = rows.map(r => r.map(v => '"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'GeoCharteRly_Competencies.csv';
  a.click();
}

function uploadCompCSV(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const lines = e.target.result.split(/\r?\n/).filter(l => l.trim());
      if (lines.length < 2) { alert('CSV appears empty.'); return; }
      const header = lines[0].split(',').map(h => h.replace(/^"|"$/g,'').trim().toLowerCase());
      const idIdx  = header.indexOf('id');
      const refIdx = header.findIndex(h => h.includes('internal') || h.includes('reference') || h.includes('your'));
      if (idIdx === -1) { alert('CSV must have an "ID" column.'); return; }
      if (!S.compAliases) S.compAliases = {};
      let mapped = 0;
      for (let i = 1; i < lines.length; i++) {
        const cols = [];
        let cur = '', inQ = false;
        for (const ch of lines[i] + ',') {
          if (ch === '"') { inQ = !inQ; }
          else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
          else { cur += ch; }
        }
        const id  = (cols[idIdx]||'').replace(/^"|"$/g,'').trim();
        const ref = refIdx >= 0 ? (cols[refIdx]||'').replace(/^"|"$/g,'').trim() : '';
        if (id && ref) { S.compAliases[id] = ref; mapped++; }
      }
      saveState(); render();
      alert('✅ ' + mapped + ' competency reference(s) imported successfully.');
    } catch(err) { alert('Error reading CSV: ' + err.message); }
    input.value = '';
  };
  reader.readAsText(file);
}

function cpdUploadCSV(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const lines = ev.target.result.split(/\r?\n/).filter(l => l.trim());
    const imported = [];
    lines.forEach((line, i) => {
      if (i === 0) return; // skip header
      const cols = [];
      let cur = "", inQ = false;
      for (let ci = 0; ci < line.length; ci++) {
        const ch = line[ci];
        if (ch === '"' && !inQ)                      { inQ = true; }
        else if (ch === '"' && inQ && line[ci+1]==='"') { cur += '"'; ci++; }
        else if (ch === '"' && inQ)                  { inQ = false; }
        else if (ch === ',' && !inQ)                 { cols.push(cur.trim()); cur = ""; }
        else                                         { cur += ch; }
      }
      cols.push(cur.trim());
      if (!cols[0]) return;
      imported.push({
        id:            "cpd_" + Date.now() + "_" + i,
        title:          cols[0]||"",
        status:         cols[1]||"Planned",
        startDate:      cols[2]||"",
        hours:          cols[3]||"0",
        mins:           cols[4]||"0",
        ricsContent:    cols[5]||"No",
        activityType:   cols[6]||"Online/Distance Learning",
        otherType:      cols[7]||"",
        structured:     cols[8]||"Structured",
        dataTech:       cols[9]||"No",
        dataTechDetail: cols[10]||"",
        sustain:        cols[11]||"No",
        sustainDetail:  cols[12]||"",
        ethics:         cols[13]||"No",
        ethicsDetail:   cols[14]||"",
        outcome:        cols[15]||""
      });
    });
    if (imported.length > 0) {
      S.cpd = (S.cpd||[]).concat(imported);
      saveState(); render();
      alert(imported.length + " CPD record(s) imported.");
    } else {
      alert("No valid records found. Check the CSV matches the downloaded template.");
    }
  };
  reader.readAsText(file, "latin1");
  input.value = "";
}

  }
  CPD_EDITING = null; CPD_FORM_OPEN = false;
  saveState(); render();
}

function cpdEdit(id) {
  CPD_EDITING = id; CPD_FORM_OPEN = true;
  S.activeSection = "cpd"; S.step = 3;
  saveState(); render();
}

function cpdDelete(id) {
  if (!confirm("Delete this CPD entry?")) return;
  S.cpd = (S.cpd||[]).filter(e => e.id !== id);
  CPD_EDITING = null; CPD_FORM_OPEN = false;
  saveState(); render();
}

function cpdCancelForm() {
  CPD_EDITING = null; CPD_FORM_OPEN = false;
  saveState(); render();
}

// ── Shared RICS stab bar builder ─────────────────────────────────────────────
// Builds the 4-tab bar for RICS Submission Documents step.
// When RPQ route is active, Statements and Case Study stabs are omitted entirely.
function buildRicsStabBar(activeSection, counts) {
  const rpq   = isRPQRoute();
  const isCPD = activeSection === 'cpd';
  const isCV  = activeSection === 'cv';
  const div   = document.createElement('div');
  div.className = 'section-tabs-bar';
  div.id = 'section-tabs-bar';

  const stab = (extraCls, isActive, onclick, label) => {
    const d = document.createElement('div');
    d.className = 'stab' + (extraCls ? ' '+extraCls : '') + (isActive ? ' active' : '');
    if (onclick) d.setAttribute('onclick', onclick);
    d.textContent = label;
    return d;
  };

  // Statements — hidden for RPQ
  if (!rpq) {
    div.appendChild(stab('',
      activeSection==='mandatory' || activeSection==='technical',
      "switchSection('mandatory')",
      'Statements of Competence'
    ));
  }

  // CPD — always shown
  div.appendChild(stab('stab-cpd',
    isCPD,
    "switchSection('cpd')",
    'CPD Logbook'
  ));

  // Case Study — hidden for RPQ
  if (!rpq) {
    div.appendChild(stab('stab-cs',
      activeSection==='casestudy',
      "switchSection('casestudy')",
      'Case Study'
    ));
  }

  // Professional CV — always shown
  div.appendChild(stab('stab-cv',
    isCV,
    "switchSection('cv')",
    'Professional CV'
  ));

  return div;
}

let CV_EDITING = null;
let CV_FORM_OPEN = false;
let CICES_CV_FORM_OPEN = false;
let CICES_CV_EDITING = null;

function cvDownloadCSV() {
  const entries = S.cv || [];
  const header = ["Employer","Position/Job Title","Date From (MM/YYYY)","Date To (MM/YYYY)","Overview of Scope and Responsibilities"];
  const rows = [header, ...entries.map(e => [
    e.employer||"", e.position||"", e.dateFrom||"", e.dateTo||"", e.overview||""
  ])];
  const csv = rows.map(r => r.map(c => {
    const s = String(c);
    return (s.includes(",") || s.includes("\n") || s.includes('"'))
      ? '"' + s.replace(/"/g, '""') + '"' : s;
  }).join(",")).join("\r\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv], {type:"text/csv;charset=utf-8"}));
  a.download = "RICS_Professional_CV.csv";
  a.click();
  URL.revokeObjectURL(a.href);
}

function cvUploadCSV(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const lines = ev.target.result.split(/\r?\n/).filter(l => l.trim());
    const imported = [];
    lines.forEach((line, i) => {
      if (i === 0) return;
      const cols = [];
      let cur = "", inQ = false;
      for (let ci = 0; ci < line.length; ci++) {
        const ch = line[ci];
        if (ch === '"' && !inQ) { inQ = true; }
        else if (ch === '"' && inQ && line[ci+1] === '"') { cur += '"'; ci++; }
        else if (ch === '"' && inQ) { inQ = false; }
        else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ""; }
        else { cur += ch; }
      }
      cols.push(cur.trim());
      if (!cols[0] && !cols[1]) return;
      imported.push({
        id: "cv_" + Date.now() + "_" + i,
        employer: cols[0]||"", position: cols[1]||"",
        dateFrom: cols[2]||"", dateTo:   cols[3]||"",
        overview: cols[4]||""
      });
    });
    if (imported.length > 0) {
      S.cv = (S.cv||[]).concat(imported);
      saveState(); render();
      alert(imported.length + " record(s) imported.");
    } else {
      alert("No valid records found. Make sure the CSV matches the downloaded template.");
    }
  };
  reader.readAsText(file);
  input.value = "";
}

function cvSaveForm() {
  const val = id => { const el = document.getElementById(id); return el ? el.value.trim() : ""; };
  if (!val("cv_employer") && !val("cv_position")) {
    alert("Please fill in at least Employer or Position."); return;
  }
  const entry = {
    id:       CV_EDITING || ("cv_" + Date.now()),
    employer: val("cv_employer"),
    position: val("cv_position"),
    dateFrom: val("cv_dateFrom"),
    dateTo:   document.getElementById("cv_present")?.checked ? "Present" : val("cv_dateTo"),
    overview: val("cv_overview"),
  };
  if (CV_EDITING) {
    const idx = (S.cv||[]).findIndex(e => e.id === CV_EDITING);
    if (idx >= 0) S.cv[idx] = entry; else S.cv.push(entry);
  } else {
    if (!S.cv) S.cv = [];
    S.cv.push(entry);
  }

function exportJSON() {

function importJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const saved = JSON.parse(e.target.result);
      Object.assign(S, saved);
      if (!S.elig) S.elig = {hasDegree:null,degreeLevel:null,degreeAccredited:null,expYears:null,
                             hasProfMembership:null,memberAccredited:null,exp5Years:null,
                             rpqBody:null,rpqExpYears:null,result:null,
                             cHasDegree:null,cExpWithDeg:null,cExpNoDeg:null,cExpPossibly:null};
      if (S.elig && S.elig.cHasDegree === undefined) { S.elig.cHasDegree=null; S.elig.cExpWithDeg=null; S.elig.cExpNoDeg=null; S.elig.cExpPossibly=null; }
      if (!S.appendices)    S.appendices = [];
      if (!S.erAppendices)  S.erAppendices = [];
      if (!S.experienceReport) S.experienceReport = "";
      if (!S.detailedCV) S.detailedCV = "";
      if (!S.cpd)        S.cpd = [];
      if (!S.cv)         S.cv  = [];
      if (!S.statements) S.statements = {};
      if (!S.completed)  S.completed  = {};
      if (!S.sel)        S.sel = { core:[], sf3Level:1, spec:null, opt:[], tech:null, cicesSpecialism:null };
      if (!S.sel.core)   S.sel.core = [];
      if (!S.sel.opt)    S.sel.opt  = [];
      if (S.sel.cicesSpecialism === undefined) S.sel.cicesSpecialism = null;
      if (!S.cicesGrades) S.cicesGrades = {};
      if (!['mandatory','technical','cpd','casestudy','cv','competencies','experiencereport'].includes(S.activeSection)) S.activeSection = 'mandatory';
      document.body.className = "rics-mode" + (isRPQRoute()?" rpq-mode":"");
      saveState();
      render();
      alert("✅ Session imported successfully.");
    } catch(err) {
      alert("❌ Could not import file — please check it is a valid portal JSON export.\n\nError: " + err.message);
    }
  };
  reader.readAsText(file);
  input.value = "";
}

function exportData() {
  const comps = buildAllComps();
  const dl = getDesigLabel();
  let out = `RICS GEOMATICS — ${dl}\nGenerated: ${new Date().toLocaleDateString("en-GB")}\n${"═".repeat(62)}\n\n`;

  ["Mandatory","Core","Core — Measurement","Specialism","Optional","Technical"].forEach(cat => {
    const cc = comps.filter(c => c.cat === cat);
    if (!cc.length) return;
    out += `${"═".repeat(62)}\n${cat.toUpperCase()}\n${"═".repeat(62)}\n\n`;
    cc.forEach(comp => {
      out += `${comp.id}  —  ${comp.name}  [Required to Level ${comp.req}]\n${"─".repeat(50)}\n`;
      for (let l = 1; l <= comp.req; l++) {
        const txt = S.statements[`${comp.id}_L${l}`] || "";
        out += `Level ${l}  (${cw(txt)} / ${WORD_TARGETS[l]} words):\n${txt || "[Not yet written]"}\n\n`;
      }
      out += "\n";
    });
  });

  out += `${"═".repeat(62)}\nCASE STUDY  (${cw(S.caseStudy)} / 3,000 words)\n${"═".repeat(62)}\n\n${S.caseStudy || "[Not yet written]"}`;

  // Appendix images list
  if (S.appendices && S.appendices.length) {
    out += `\n\n${"═".repeat(62)}\nAPPENDIX IMAGES\n${"═".repeat(62)}\n`;
    S.appendices.forEach(img => {
      const titleLine = img.title ? `\nTitle: ${img.title}` : "";
      out += `\n${img.label} — ${img.name}${titleLine}\n[Image data embedded — open HTML export to view]\n`;
    });
  }

  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([out], {type:"text/plain"}));
  a.download = "RICS_Geomatics_Submission_Draft.txt";
  a.click();
  URL.revokeObjectURL(a.href);
}


// ════════════════════════════════════════════════════════ GLOSSARY PANEL ══════

// G state: what the sidebar is currently showing
let G = { compId: null, level: null };

// Called on comp row hover (Step 2) — show module description
function setGlossaryComp(id) {
  G.compId = id;
  G.level  = null;
  renderGlossary();
}

// Called on textarea focus (Step 3) — show evidence examples for that level
function setGlossaryLevel(id, level) {
  G.compId = id;
  G.level  = level;
  renderGlossary();
}

// Convert bullet-point plain text into styled HTML list
function glossaryTextToHtml(text) {
  if (!text) return '<span style="color:var(--faint);font-style:italic">Not available.</span>';
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  let html = '';
  let inList = false;
  lines.forEach(line => {
    if (line.startsWith('•')) {
      if (!inList) { html += '<ul class="g-list">'; inList = true; }
      html += `<li>${line.replace(/^•\s*/,'')}</li>`;
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<p class="g-intro">${line}</p>`;
    }
  });
  if (inList) html += '</ul>';
  return html;
}

function renderGlossary() {
  const el = document.getElementById("g-sidebar-content");
  if (!el) return;

  // Resolve ID: strip common suffixes (t=tech variant, o=opt variant, c=conflict variant)
  function resolveId(id) {
    if (!id) return null;
    if (GLOSSARY[id]) return GLOSSARY[id];
    // strip single trailing suffix char
    const stripped = id.replace(/[tco]$/, '');
    if (GLOSSARY[stripped]) return GLOSSARY[stripped];
    return null;
  }
  const entry = resolveId(G.compId);

  if (!entry) {
    el.innerHTML = `<div class="g-empty">
      <div class="g-empty-icon">📖</div>
      <p>Hover over a competency or click into a statement textarea to see RICS guidance and evidence examples here.</p>
    </div>`;
    return;
  }

  // ── Header ───────────────────────────────────────────────────────────────
  let html = `<div class="g-panel-header">
    <div class="g-panel-title">${entry.name}</div>
    <div class="g-panel-meta">
      <span class="g-meta-id">${G.compId}</span>
      ${G.level ? `<span class="g-meta-level">Level ${G.level}</span>` : ''}
      ${entry.lreq ? `<span class="g-meta-req">Req: L${entry.lreq}</span>` : ''}
    </div>
  </div>
  <div class="g-panel-body">`;

  if (G.level) {
    // ── STATEMENT MODE: focus on evidence examples for active level ─────────
    const exKey  = `L${G.level}ex`;
    const defKey = `L${G.level}def`;
    const ex  = entry[exKey];
    const def = entry[defKey];

    html += `<div class="g-section-label">Level ${G.level} — What is required</div>`;
    html += `<div class="g-def-box">${def || '<span style="color:var(--faint);font-style:italic">Not available.</span>'}</div>`;

    html += `<div class="g-section-label" style="margin-top:14px">Level ${G.level} Evidence Examples</div>`;
    html += `<div class="g-ex-box">${glossaryTextToHtml(ex)}</div>`;

    // ── Other levels as collapsed reference ──────────────────────────────
    [1,2,3].filter(l => l !== G.level).forEach(l => {
      const lEx  = entry[`L${l}ex`];
      const lDef = entry[`L${l}def`];
      if (!lEx && !lDef) return;
      html += `<details class="g-details">
        <summary class="g-summary">Level ${l} reference</summary>
        ${lDef ? `<div class="g-def-box g-def-faint">${lDef}</div>` : ''}
        ${lEx  ? `<div class="g-ex-box g-ex-faint">${glossaryTextToHtml(lEx)}</div>` : ''}
      </details>`;
    });

  } else {
    // ── HOVER MODE: show module description + all level summaries ───────────
    html += `<div class="g-section-label">RICS Module Description</div>`;
    html += `<div class="g-def-box">${entry.desc || '<span style="color:var(--faint);font-style:italic">No description available.</span>'}</div>`;

    // Level definitions summary
    [1,2,3].forEach(l => {
      const def = entry[`L${l}def`];
      const ex  = entry[`L${l}ex`];
      if (!def && !ex) return;
      html += `<details class="g-details" ${l===1?'open':''}>
        <summary class="g-summary">Level ${l} — Evidence Examples</summary>
        ${def ? `<div class="g-def-box">${def}</div>` : ''}
        ${ex  ? `<div class="g-ex-box">${glossaryTextToHtml(ex)}</div>` : ''}
      </details>`;
    });
  }

  html += '</div>';
  el.innerHTML = html;
}

function buildGlossarySidebar() {
  return `<div class="g-sidebar" id="g-sidebar">
    <div class="g-panel">
      <div id="g-sidebar-content">
        <div class="g-empty">
          <div class="g-empty-icon">📖</div>
          <p>Hover over a competency to see the RICS Module Description, or click into a statement textarea to see level-specific evidence examples.</p>
        </div>
      </div>
    </div>
  </div>`;
}


// ═════════════════════════════════════════════ AUTOSAVE & RESET ══════════════

const SAVE_KEY = "rics_portal_v1";

function saveState() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(S));
    // Flash autosave indicator
    const ind = document.getElementById("autosave-ind");
    if (ind) {
      ind.classList.add("visible");
      clearTimeout(ind._t);
      ind._t = setTimeout(()=>ind.classList.remove("visible"), 2000);
    }
  } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const saved = JSON.parse(raw);
    // Deep-merge saved state into S to preserve any new fields
    Object.assign(S, saved);
    if (!S.elig) S.elig = {hasDegree:null,degreeLevel:null,degreeAccredited:null,expYears:null,
                           hasProfMembership:null,memberAccredited:null,exp5Years:null,
                           rpqBody:null,rpqExpYears:null,result:null,
                           cHasDegree:null,cExpWithDeg:null,cExpNoDeg:null,cExpPossibly:null};
    if (S.elig && S.elig.cHasDegree === undefined) { S.elig.cHasDegree=null; S.elig.cExpWithDeg=null; S.elig.cExpNoDeg=null; S.elig.cExpPossibly=null; }
    if (!S.pathway)      S.pathway = null;
    if (!S.subDesig)     S.subDesig = null;
    if (!S.appendices)   S.appendices = [];
    if (!S.erAppendices) S.erAppendices = [];
    if (!S.experienceReport) S.experienceReport = "";
      if (!S.detailedCV) S.detailedCV = "";
    if (!S.cpd) S.cpd = [];
    if (!S.cicesGrades) S.cicesGrades = {};
    if (!S.sel) S.sel = { core:[], sf3Level:1, spec:null, opt:[], tech:null, cicesSpecialism:null };
    if (S.sel.cicesSpecialism === undefined) S.sel.cicesSpecialism = null;
    if (!['mandatory','technical','cpd','casestudy','cv','competencies','experiencereport'].includes(S.activeSection)) S.activeSection='mandatory';
    if (!S.cv) S.cv = [];
    return true;
  } catch(e) { return false; }
}

function confirmReset() {
  // First confirmation
  const first = confirm("⚠️ Reset all portal data?\n\nThis will permanently erase your eligibility answers, selected competencies, all written statements, and your case study.\n\nClick OK to confirm, or Cancel to go back.");
  if (!first) return;
  // Second confirmation — double prompt as requested
  const second = confirm("🛑 Final confirmation: ALL data will be erased and cannot be recovered.\n\nAre you absolutely sure you want to reset?");
  if (!second) return;
  hardReset();
}

function hardReset() {
  try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
  // Reload page to fully reset
  location.reload();
}
