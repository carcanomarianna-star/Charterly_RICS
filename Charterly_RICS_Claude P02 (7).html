        Your choice of project is very important and must reflect your specific APC pathway. It may be a complex or large project, or something more straightforward and typical of your work. The project may include work undertaken outside your country of assessment.
        <br><br>
        Assessors will be looking for a real-life project where you dealt with a <strong>key issue, anomaly or challenge</strong>. You are not necessarily expected to have led the project — it is your <strong>involvement or role in the team</strong> that matters.
      </div>
    </div>

    <hr class="cs-guide-divider">

    <div class="cs-guide-section">
      <div class="cs-guide-section-title">Required structure</div>
      ${[
        ["1","Introduction (~500 words)","Summarise the project and your role. Cover: What did you do? Level of responsibility? Stakeholders? Timeline?"],
        ["2","My Approach","Describe the key issues or challenges. Explain why they became a challenge for you, options considered, and solutions identified."],
        ["3","My Achievements","Describe what you achieved and how. Demonstrate logical, lateral and professional thinking. Give examples of reasoned advice for your Level 3 competencies."],
        ["4","Conclusion","Reflect on and analyse your performance. Reference lessons learned and what you would do differently. This shows your analytical thinking and professional development."],
      ].map(([n,t,d])=>`
        <div class="cs-structure-item">
          <div class="cs-structure-num">${n}</div>
          <div class="cs-structure-body">
            <div class="cs-structure-label">${t}</div>
            <div class="cs-structure-desc">${d}</div>
          </div>
        </div>
      `).join("")}
    </div>

    <hr class="cs-guide-divider">

    <div class="cs-guide-section">
      <div class="cs-guide-section-title">Appendices</div>
      <div class="cs-guide-text">
        <strong>Appendix A</strong> — List the mandatory and technical competencies demonstrated in your case study.<br><br>
        <strong>Appendix B, C…</strong> — You may insert illustrations, photographs or plans. Keep attachments to a minimum and ensure they are relevant. Appendices should <em>support</em> your report, not add to or expand on it.
      </div>
    </div>

    <hr class="cs-guide-divider">

    <div class="cs-guide-section">
      <div class="cs-guide-section-title">Important reminders</div>
      <div class="cs-guide-text">
        ⏱ Your case study <strong>validity is calculated on a rolling 24-month period</strong> from your submission date. You must reference the start date and end date of the project clearly — RICS will not accept case studies where this is absent.<br><br>
        🎙 You will use your case study to make a <strong>10-minute presentation</strong> to the final assessment panel.<br><br>
        ✂️ If RICS staff discover your case study exceeds the word count, <strong>they reserve the right to cancel your interview</strong>.<br><br>
        🔍 It is <strong>quality not quantity</strong> that counts. Focus on analysing the project — do not simply summarise what it involved.
      </div>
    </div>
  `;
}

function updCS(val) {
  S.caseStudy = val;
  saveState();
  const n   = cw(val);
  const pct = Math.min((n / 3000) * 100, 100);
  const col = n > 3000 ? "#c0392b" : n >= 1500 ? "#2e7d52" : "#b5651d";

  const el = document.getElementById("cs-wc");
  const bf = document.getElementById("cs-wbf");
  if (el) { el.textContent = n + " / 3,000 words"; el.style.color = col; }
  if (bf) { bf.style.width = pct + "%"; bf.style.background = col; }

  const p  = calcProgress();
  const pf = document.getElementById("prog-fill");
  const pl = document.getElementById("prog-label");
  if (pf) pf.style.width = p + "%";
  if (pl) pl.textContent = p + "%";

  // Update summary grid
  const sumGrid = document.getElementById("cs-summary-grid");
  if (sumGrid) sumGrid.innerHTML = buildSummaryGrid(n);

  // Refresh figure reference overlay (debounced)
  clearTimeout(updCS._t);
  updCS._t = setTimeout(buildFigOverlay, 600);
}

// ════════════════════════════════════════════════════════════ UTILS ══════════

function esc(s) { return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// ════════════════════════════════════════════════════════════ BOOT ═══════════
// Load saved state from localStorage, then render
loadState();
// Restore body CSS class from saved state
document.body.className = "rics-mode" + (isRPQRoute()?" rpq-mode":"");
render();
</script>
